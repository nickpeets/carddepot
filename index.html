<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Depot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --leather:#5a2118;
  --leather-dark:#3d160f;
  --leather-light:#6e2c20;
  --cream:#f2ead8;
  --cream-dim:#e4d9c1;
  --ink:#2a2018;
  --ink-soft:#5e5345;
  --brass:#c79a3b;
  --brass-deep:#a07820;
  --felt:#1f3a2e;
  --paper:#fbf6ea;
  --shadow:rgba(30,15,8,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Spectral',Georgia,serif;
  background:
    radial-gradient(circle at 30% 20%, #6e2c20 0%, transparent 60%),
    radial-gradient(circle at 80% 80%, #4a1c14 0%, transparent 55%),
    var(--leather);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--brass);outline-offset:2px}

/* ---------- top bar ---------- */
.topbar{
  display:flex;align-items:baseline;gap:1.25rem;
  padding:1.4rem 2rem 1.1rem;
  border-bottom:1px solid rgba(199,154,59,.3);
}
.brand{
  font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.04em;
  font-size:1.9rem;color:var(--cream);text-transform:uppercase;
  line-height:1;
}
.brand .the{color:var(--brass);font-weight:500;font-size:1.1rem;vertical-align:.35em;margin-right:.3rem}
.tagline{font-style:italic;color:var(--cream-dim);font-size:.95rem;opacity:.8}
.count-chip{
  margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:.8rem;
  color:var(--brass);border:1px solid rgba(199,154,59,.4);
  padding:.35rem .7rem;border-radius:4px;letter-spacing:.03em;
}

/* ---------- mode toggle ---------- */
.modes{display:flex;gap:.5rem;padding:1rem 2rem 0;flex-wrap:wrap}
.mode-btn{
  font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.08em;
  font-size:.82rem;font-weight:500;color:var(--cream-dim);
  padding:.55rem 1.1rem;border:1px solid rgba(199,154,59,.3);border-radius:5px;
  background:rgba(0,0,0,.12);transition:all .18s;
}
.mode-btn:hover{color:var(--cream);border-color:rgba(199,154,59,.6)}
.mode-btn.active{background:var(--brass);color:var(--leather-dark);border-color:var(--brass);font-weight:600}

/* ---------- era rail ---------- */
.stage{display:flex;gap:0;padding:1.25rem 2rem 3rem;align-items:flex-start}
.rail{flex:0 0 150px;display:flex;flex-direction:column;gap:.4rem;position:sticky;top:1rem}
.rail-label{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.12em;font-size:.68rem;color:var(--brass);margin-bottom:.3rem;padding-left:.2rem}
.era-tab{
  text-align:left;font-family:'Oswald',sans-serif;font-size:.9rem;letter-spacing:.02em;
  color:var(--cream-dim);padding:.6rem .75rem;border-radius:5px;border-left:3px solid transparent;
  transition:all .16s;line-height:1.15;
}
.era-tab small{display:block;font-family:'JetBrains Mono',monospace;font-size:.62rem;opacity:.6;margin-top:.15rem}
.era-tab:hover{background:rgba(0,0,0,.15);color:var(--cream)}
.era-tab.active{background:rgba(0,0,0,.22);color:var(--brass);border-left-color:var(--brass)}

/* ---------- binder ---------- */
.binder-wrap{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center}
.era-head{width:100%;margin-bottom:1rem;text-align:center}
.era-title{font-family:'Oswald',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:1.5rem;color:var(--cream)}
.era-blurb{font-style:italic;color:var(--cream-dim);opacity:.85;font-size:.95rem;margin-top:.2rem}
.group-by{display:flex;align-items:center;gap:.5rem;margin-top:.6rem;font-size:.9rem;color:var(--cream-dim)}
.group-by label{text-transform:uppercase;letter-spacing:.06em;font-size:.78rem;opacity:.8}
.group-by select{background:rgba(0,0,0,.25);color:var(--cream);border:1px solid var(--cream-dim);border-radius:6px;padding:.25rem .5rem;font:inherit}
.group-section{margin:0 0 1.6rem}
.group-head{display:flex;align-items:center;gap:.5rem;font-size:1.05rem;color:var(--cream);border-bottom:1px solid rgba(255,255,255,.15);padding-bottom:.3rem;margin:.4rem 0 .8rem}
.group-count{font-size:.78rem;background:rgba(255,255,255,.12);border-radius:999px;padding:.05rem .5rem;color:var(--cream-dim)}
.group-grid{margin-bottom:.4rem}
.group-empty{color:var(--cream-dim);font-style:italic}

.page{
  background:
    repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.012) 3px),
    var(--paper);
  border-radius:6px;padding:1.4rem;
  box-shadow:0 16px 40px var(--shadow), inset 0 0 0 1px rgba(0,0,0,.04);
  width:100%;max-width:680px;position:relative;
  border:1px solid rgba(0,0,0,.08);
}
.page::before{
  content:"";position:absolute;left:14px;top:8%;bottom:8%;width:2px;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.18) 0 6px,transparent 6px 22px);
  border-radius:2px;
}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.85rem;margin-left:1rem}

.slot{aspect-ratio:5/7;border-radius:6px;position:relative}
.slot.empty{
  border:1.5px dashed rgba(0,0,0,.13);border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  color:rgba(0,0,0,.18);font-family:'JetBrains Mono',monospace;font-size:.7rem;
}

/* ---------- card face ---------- */
.card{
  width:100%;height:100%;border-radius:6px;overflow:hidden;cursor:pointer;
  position:relative;transition:transform .18s ease, box-shadow .18s ease;
  box-shadow:0 3px 8px rgba(0,0,0,.22);text-align:left;display:block;
  border:1px solid rgba(0,0,0,.15);
}
.card:hover{transform:translateY(-5px) scale(1.02);box-shadow:0 12px 22px rgba(0,0,0,.3);z-index:2}
.card .frame{position:absolute;inset:0;display:flex;flex-direction:column}
.card .photo{
  flex:1;background-size:cover;background-position:center top;position:relative;
}
.card .nameplate{
  padding:.3rem .45rem;font-family:'Oswald',sans-serif;font-weight:600;
  font-size:.66rem;line-height:1.05;text-transform:uppercase;letter-spacing:.01em;
}
.card .pos{font-family:'JetBrains Mono',monospace;font-size:.54rem;opacity:.8;display:block;font-weight:400;letter-spacing:0}
.rare-pin{
  position:absolute;top:5px;right:5px;width:16px;height:16px;border-radius:50%;
  background:var(--brass);color:var(--leather-dark);font-size:.6rem;
  display:flex;align-items:center;justify-content:center;font-weight:700;
  box-shadow:0 1px 3px rgba(0,0,0,.4);z-index:3;font-family:'Oswald',sans-serif;
}

/* era-specific card skins */
.skin-vintage .nameplate{background:#d9c89a;color:#3a2c12;border-top:2px solid #b8472e}
.skin-vintage .photo{background-color:#c7b48a;filter:saturate(.85)}
.skin-junk .nameplate{background:#1c1c1c;color:#fff}
.skin-junk .photo{background-color:#2a3f55}
.skin-junk .card{border-color:#000}
.skin-modern .nameplate{background:linear-gradient(90deg,#0d2436,#16456a);color:#cfe6f5}
.skin-modern .photo{background-color:#21323f}

.page-nav{display:flex;align-items:center;justify-content:center;gap:1.5rem;margin-top:1.1rem}
.page-nav button{
  font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.06em;font-size:.8rem;
  color:var(--cream-dim);padding:.5rem .9rem;border:1px solid rgba(199,154,59,.3);border-radius:5px;
  transition:all .15s;
}
.page-nav button:hover:not(:disabled){color:var(--cream);border-color:var(--brass)}
.page-nav button:disabled{opacity:.3;cursor:default}
.page-dots{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--brass)}

/* ---------- carousel ---------- */
.carousel-stage{padding:1.5rem 2rem 3rem;display:none;flex-direction:column;align-items:center}
.set-picker{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;margin-bottom:1.5rem;max-width:760px}
.set-pill{
  font-family:'Oswald',sans-serif;font-size:.8rem;letter-spacing:.02em;color:var(--cream-dim);
  padding:.5rem .9rem;border:1px solid rgba(199,154,59,.3);border-radius:20px;transition:all .15s;
}
.set-pill:hover{color:var(--cream);border-color:rgba(199,154,59,.6)}
.set-pill.active{background:var(--brass);color:var(--leather-dark);border-color:var(--brass);font-weight:600}
.set-pill small{font-family:'JetBrains Mono',monospace;opacity:.65;margin-left:.35rem;font-size:.68rem}

.carousel-head{text-align:center;margin-bottom:1.2rem}
.carousel-head .set-name{font-family:'Oswald',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:1.6rem;color:var(--cream)}
.carousel-head .set-meta{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--brass);margin-top:.25rem}

.reel{display:flex;align-items:center;gap:1.5rem;width:100%;justify-content:center}
.reel-track{display:flex;gap:1rem;overflow-x:auto;padding:1.5rem .5rem;scroll-snap-type:x mandatory;max-width:760px;scrollbar-width:thin;scrollbar-color:var(--brass) transparent}
.reel-track::-webkit-scrollbar{height:8px}
.reel-track::-webkit-scrollbar-thumb{background:var(--brass);border-radius:4px}
.reel-card{flex:0 0 170px;aspect-ratio:5/7;scroll-snap-align:center;transition:transform .2s;}
.reel-arrow{
  flex:0 0 auto;width:44px;height:44px;border-radius:50%;
  border:1px solid rgba(199,154,59,.4);color:var(--brass);font-size:1.2rem;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.reel-arrow:hover{background:var(--brass);color:var(--leather-dark)}

/* ---------- spotlight ---------- */
.spotlight{
  position:fixed;inset:0;background:rgba(20,8,4,.82);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;z-index:50;padding:2rem;
}
.spotlight.open{display:flex}
.spot-card{
  perspective:1600px;width:min(340px,80vw);aspect-ratio:5/7;cursor:pointer;
}
.spot-inner{position:relative;width:100%;height:100%;transition:transform .7s;transform-style:preserve-3d}
.spot-card.flipped .spot-inner{transform:rotateY(180deg)}
.spot-face{
  position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;overflow:hidden;
  box-shadow:0 0 0 1px rgba(199,154,59,.5),0 30px 70px rgba(0,0,0,.6),0 0 60px rgba(199,154,59,.15);
}
.spot-back{transform:rotateY(180deg);background:var(--paper);padding:1.1rem 1.1rem .9rem;display:flex;flex-direction:column;overflow-y:auto}
.back-head{display:flex;align-items:baseline;justify-content:space-between;gap:.5rem;border-bottom:2px solid var(--leather);padding-bottom:.4rem;margin-bottom:.35rem}
.back-head h3{font-family:'Oswald',sans-serif;text-transform:uppercase;font-size:1.05rem;color:var(--ink);line-height:1}
.back-badge{font-family:'JetBrains Mono',monospace;font-size:.56rem;letter-spacing:.04em;color:var(--cream);background:var(--leather);padding:.2rem .4rem;border-radius:3px;white-space:nowrap}
.back-sub{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--brass);margin-bottom:.7rem}
.statgrid-wrap{overflow-x:auto;margin:0 -.2rem .6rem;scrollbar-width:thin;scrollbar-color:var(--brass) transparent}
.statgrid-wrap::-webkit-scrollbar{height:5px}
.statgrid-wrap::-webkit-scrollbar-thumb{background:var(--brass);border-radius:3px}
.statgrid{border-collapse:collapse;font-family:'JetBrains Mono',monospace;width:100%}
.statgrid caption{caption-side:top;text-align:left;font-family:'Spectral',serif;font-style:italic;font-size:.7rem;color:var(--ink-soft);margin-bottom:.3rem}
.statgrid th{font-size:.56rem;letter-spacing:.02em;color:var(--cream);background:var(--leather-light);padding:.28rem .4rem;text-align:center;font-weight:500;border:1px solid var(--leather)}
.statgrid td{font-size:.72rem;color:var(--ink);padding:.32rem .4rem;text-align:center;border:1px solid rgba(0,0,0,.12);background:#fff}
.no-stats{font-family:'Spectral',serif;font-style:italic;font-size:.78rem;color:var(--ink-soft);padding:.5rem 0}
.spot-back .bio{font-style:italic;font-size:.78rem;color:var(--ink-soft);line-height:1.4;margin-bottom:.5rem}
.back-foot{margin-top:auto;padding-top:.4rem}
.btn-bref{width:100%;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.04em;font-size:.68rem;padding:.5rem;background:#fff;color:var(--leather);border:1px solid var(--leather);border-radius:5px}
.btn-bref:hover{background:var(--leather);color:var(--cream)}
.spot-meta{
  position:absolute;bottom:-3.2rem;left:0;right:0;text-align:center;
  font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--cream-dim);
}
.spot-meta .hint{color:var(--brass);opacity:.8}
.spot-close{
  position:fixed;top:1.5rem;right:1.5rem;width:40px;height:40px;border-radius:50%;
  border:1px solid rgba(199,154,59,.4);color:var(--cream);font-size:1.3rem;
  display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);
}
.spot-close:hover{background:var(--brass);color:var(--leather-dark)}

/* ---------- add-card form ---------- */
.form-scrim{
  position:fixed;inset:0;background:rgba(20,8,4,.82);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;z-index:60;padding:1.5rem;
}
.form-scrim.open{display:flex}
.form-card{
  background:var(--paper);border-radius:12px;width:min(720px,96vw);max-height:92vh;overflow-y:auto;
  box-shadow:0 30px 70px rgba(0,0,0,.6),0 0 0 1px rgba(199,154,59,.4);
}
.form-head{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.4rem;border-bottom:2px solid var(--leather)}
.form-head h2{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.04em;font-size:1.3rem;color:var(--ink)}
.form-body{display:flex;gap:1.5rem;padding:1.3rem 1.4rem}
.rolodex{background:linear-gradient(180deg,#f6efe0,#efe6d2);border:1px solid var(--brass);border-radius:8px;padding:.8rem .9rem;margin-bottom:.4rem}
.rolodex-head{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.05em;font-size:.72rem;color:var(--leather);display:flex;align-items:center;gap:.35rem;margin-bottom:.55rem}
.rolodex-tag{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:.56rem;background:var(--leather);color:var(--cream);padding:.15rem .4rem;border-radius:3px;letter-spacing:.02em}
.rolo-row{display:flex;gap:.4rem}
.rolo-row input{flex:1;font-family:'Spectral',serif;font-size:.88rem;padding:.45rem .55rem;border:1px solid rgba(0,0,0,.2);border-radius:5px;background:#fff}
.rolo-row button{flex:0 0 auto;font-family:'Oswald',sans-serif;text-transform:uppercase;font-size:.72rem;letter-spacing:.04em;padding:0 1rem;background:var(--leather);color:var(--cream);border-radius:5px}
.rolo-list{margin-top:.5rem;max-height:140px;overflow-y:auto;border:1px solid rgba(0,0,0,.12);border-radius:5px;background:#fff}
.rolo-player{padding:.45rem .6rem;font-size:.82rem;cursor:pointer;border-bottom:1px solid rgba(0,0,0,.06);display:flex;justify-content:space-between;gap:.5rem}
.rolo-player:last-child{border-bottom:none}
.rolo-player:hover{background:var(--cream-dim)}
.rolo-player .meta{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--ink-soft)}
.rolo-player.sel{background:var(--brass);color:var(--leather-dark)}
.rolo-years{margin-top:.55rem;display:flex;flex-wrap:wrap;gap:.3rem}
.rolo-brand{margin-top:.55rem;display:flex;flex-wrap:wrap;align-items:center;gap:.4rem}
.rolo-brand-label{font-family:'Oswald',sans-serif;font-size:.66rem;text-transform:uppercase;color:var(--leather);letter-spacing:.04em;width:100%}
.rolo-brand select,.rolo-brand input{font-family:'Spectral',serif;font-size:.82rem;padding:.35rem .45rem;border:1px solid rgba(0,0,0,.2);border-radius:5px;background:#fff;color:var(--ink)}
.rolo-brand select{flex:1;min-width:130px}
.rolo-brand input[type=number]{width:70px}
.rolo-brand input#rolo-brand-custom{flex:1;min-width:120px}
.rolo-yr{font-family:'JetBrains Mono',monospace;font-size:.72rem;padding:.3rem .55rem;border:1px solid rgba(0,0,0,.2);border-radius:4px;cursor:pointer;background:#fff;color:var(--ink)}
.rolo-yr:hover{border-color:var(--brass);background:var(--cream-dim)}
.rolo-yr.sel{background:var(--leather);color:var(--cream);border-color:var(--leather)}
.rolo-status{font-family:'Spectral',serif;font-style:italic;font-size:.74rem;color:var(--ink-soft);margin-top:.45rem;min-height:1rem}
.rolo-status.err{color:#9a3324}
.rolo-status.ok{color:#2c6b4f}
.form-left{flex:1.1;display:flex;flex-direction:column;gap:.7rem}
.form-right{flex:.9;display:flex;flex-direction:column}
.fl-row{display:flex;gap:.7rem}
.fl-field{display:flex;flex-direction:column;gap:.25rem;flex:1}
.fl-field label{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.06em;font-size:.66rem;color:var(--leather)}
.hintmini{text-transform:none;letter-spacing:0;font-family:'Spectral',serif;font-style:italic;color:var(--ink-soft);opacity:.7;font-size:.72rem}
.fl-field input,.fl-field select,.fl-field textarea,.form-right input{
  font-family:'Spectral',serif;font-size:.9rem;color:var(--ink);background:#fff;
  border:1px solid rgba(0,0,0,.18);border-radius:5px;padding:.45rem .55rem;width:100%;
}
.fl-field input:focus,.fl-field select:focus,.fl-field textarea:focus,.form-right input:focus{outline:2px solid var(--brass);outline-offset:0;border-color:var(--brass)}
.fl-field textarea{resize:vertical;font-family:'Spectral',serif}
.key-toggle{display:flex;align-items:center;gap:.4rem;font-family:'Oswald',sans-serif;font-size:.78rem;color:var(--leather);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;cursor:pointer;padding:.45rem 0}
.key-toggle input{width:auto}
.form-right label{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.06em;font-size:.66rem;color:var(--leather);margin-bottom:.35rem;display:block}
.preview{aspect-ratio:5/7;border-radius:8px;border:1.5px dashed rgba(0,0,0,.2);background:#e9e0cc center/cover no-repeat;display:flex;align-items:center;justify-content:center;margin-bottom:.7rem;overflow:hidden}
.preview.has-img{border-style:solid;border-color:var(--brass)}
.ph-text{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:rgba(0,0,0,.3)}
.img-tabs{display:flex;gap:.3rem;margin-bottom:.6rem}
.img-tab{flex:1;font-family:'Oswald',sans-serif;font-size:.72rem;text-transform:uppercase;letter-spacing:.03em;padding:.4rem;border:1px solid rgba(0,0,0,.18);border-radius:5px;color:var(--ink-soft);background:#fff}
.img-tab.active{background:var(--leather);color:var(--cream);border-color:var(--leather)}
.slot-tabs{display:flex;gap:.3rem;margin-bottom:.5rem}
.slot-tab{flex:1;font-family:'Oswald',sans-serif;font-size:.72rem;text-transform:uppercase;letter-spacing:.03em;padding:.4rem;border:1px solid rgba(0,0,0,.18);border-radius:5px;color:var(--ink-soft);background:#fff;cursor:pointer}
.slot-tab.active{background:var(--brass);color:var(--cream);border-color:var(--brass)}
.preview-row{display:flex;gap:.5rem;margin-bottom:.7rem}
.preview-slot{flex:1;display:flex;flex-direction:column;gap:.25rem;min-width:0}
.preview-slot .preview{margin-bottom:0;cursor:pointer}
.preview-slot.active-slot .preview{border-color:var(--brass);box-shadow:0 0 0 2px var(--brass)}
.slot-cap{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.06em;font-size:.6rem;color:var(--leather);text-align:center}
.spot-back-img{flex:none;width:100%;aspect-ratio:5/7;border-radius:6px;overflow:hidden;margin-bottom:.6rem;background:#e9e0cc center top/cover no-repeat;box-shadow:0 0 0 1px rgba(0,0,0,.12)}
.spot-back-img img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block}
.spot-back-scroll{flex:none;overflow:visible;scrollbar-width:thin;scrollbar-color:var(--brass) transparent}
.spot-back-scroll::-webkit-scrollbar{width:5px}
.spot-back-scroll::-webkit-scrollbar-thumb{background:var(--brass);border-radius:3px}
.img-pane input[type=file]{font-size:.78rem;font-family:'Spectral',serif}
.pane-note{font-family:'Spectral',serif;font-style:italic;font-size:.74rem;color:var(--ink-soft);margin-top:.5rem;line-height:1.4}
.search-wrap{display:flex;gap:.4rem}
.btn-google{width:100%;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.04em;font-size:.8rem;padding:.6rem;background:var(--leather);color:var(--cream);border-radius:5px;font-weight:500}
.btn-google:hover{background:var(--leather-light)}
.search-wrap button{flex:0 0 auto;font-family:'Oswald',sans-serif;text-transform:uppercase;font-size:.72rem;padding:0 .8rem;background:var(--leather);color:var(--cream);border-radius:5px}
.search-results{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin-top:.5rem}
.search-results img{width:100%;aspect-ratio:5/7;object-fit:cover;border-radius:4px;cursor:pointer;border:2px solid transparent}
.search-results img:hover{border-color:var(--brass)}
.form-foot{display:flex;justify-content:flex-end;gap:.7rem;padding:1rem 1.4rem;border-top:1px solid rgba(0,0,0,.12)}
.btn-ghost{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.05em;font-size:.82rem;color:var(--ink-soft);padding:.55rem 1.1rem;border:1px solid rgba(0,0,0,.2);border-radius:5px}
.btn-solid{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.05em;font-size:.82rem;color:var(--cream);background:var(--leather);padding:.55rem 1.3rem;border-radius:5px;font-weight:600}
.btn-solid:hover{background:var(--leather-light)}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--felt);color:var(--cream);font-family:'Oswald',sans-serif;letter-spacing:.04em;font-size:.85rem;padding:.7rem 1.3rem;border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:80;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}

@media (max-width:640px){
  .form-body{flex-direction:column}
  .stage{flex-direction:column;padding:1rem}
  .rail{flex-direction:row;flex-wrap:wrap;position:static;width:100%;margin-bottom:1rem}
  .rail-label{width:100%}
  .era-tab{flex:1;min-width:120px}
  .grid{margin-left:0}
  .page::before{display:none}
  .grid{gap:.5rem}
  .brand{font-size:1.4rem}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none!important;scroll-behavior:auto}
  .spot-inner{transition:transform .01s!important}
}
/* ---- card-accurate rolodex + grafted image-error + remove button ---- */

.drop-hot{outline:3px dashed var(--brass,#c79a3b);outline-offset:-6px;box-shadow:0 0 0 9999px rgba(199,154,59,.08) inset;transition:outline-color .1s}

html{background:#1a1a2e !important;}
body{
  background:#1a1a2e !important;
  margin:0;padding:2rem 1rem !important;min-height:100vh;
}
/* Centered cabinet frame around the whole app */
#appFrame{
  max-width:1100px;margin:0 auto;width:100%;
  background:var(--sb-blue);
  border:4px solid #000;
  box-shadow:8px 8px 0 #000, 0 0 0 2px #000;
  overflow:hidden;
}
/* Header bar spans the frame top (keep blue + bunting from reskin) */
#appFrame > .topbar{
  margin:0;border-top:none;border-left:none;border-right:none;
}
/* Toolbar row: tabs + group dropdown live just under header */
#appFrame > .modes{
  background:#0a2148;
  border-bottom:3px solid #000;
  padding:.7rem 1.2rem !important;
  margin:0;
}
/* --- Remove the left era sidebar; stage becomes a single column --- */
#binderStage.stage[data-hidden]{ display:none !important; }
  #binderStage.stage:not([data-hidden]){
    display:block !important;
  padding:1.2rem 1.4rem 1.6rem !important;
  background:transparent;
}
/* Hide the vertical rail layout; relocate era tabs to a horizontal strip */
.stage > .rail{
  flex:none !important;position:static !important;width:auto !important;
  display:block;margin:0 0 1rem 0;
}
.rail .rail-label{display:none !important;}
/* Era tabs as a horizontal scoreboard button row (era navigation, top of binder) */
#eraTabs{
  display:flex !important;flex-wrap:wrap;gap:.6rem;justify-content:center;
}
#eraTabs .era-tab{
  margin-bottom:0 !important;flex:0 1 auto;text-align:center;
}
#eraTabs .era-tab small{display:block;font-size:.5rem;opacity:.85;margin-top:.25rem;}
/* Binder wrap fills the column, centered */
.binder-wrap{width:100%;align-items:center;}
.era-head{width:100%;max-width:760px;}
/* Era title header over the cards (one era at a time) */
.era-head .era-title{font-size:1rem;}
.era-head .era-blurb{
  font-family:'Press Start 2P',monospace;font-size:.5rem;line-height:1.7;
  color:var(--brass);opacity:1;font-style:normal;margin-top:.5rem;
  text-shadow:2px 2px 0 #000;
}
.era-head .group-by{justify-content:center;margin-top:.7rem;}
/* Contained field-green binder page (3 across) */
.page{
  margin:0 auto;max-width:760px !important;
}
.grid{grid-template-columns:repeat(3,1fr) !important;margin-left:0 !important;gap:1rem !important;}
/* Cards: portrait baseball-card ratio for classic 9-pocket page */
.slot{aspect-ratio:2.5/3.5 !important;}
/* Footer nav bar */
.page-nav{
  margin-top:1.2rem !important;background:#0a2148;border:3px solid #000;
  box-shadow:4px 4px 0 #000;padding:.6rem 1rem;justify-content:space-between;
  max-width:760px;width:100%;margin-left:auto;margin-right:auto;
}
.page-nav #pageDots{order:0;}
/* --- BY SET view: contained inside frame, consistent treatment --- */
#carouselStage.carousel-stage{
  padding:1.4rem 1.4rem 1.8rem !important;background:transparent;
}
/* Add-card and spotlight remain full-screen overlays above the frame (unchanged behavior) */
/* ===== Mobile: frame goes full-width, cards reflow to fewer columns ===== */
@media (max-width:760px){
  body{padding:0 !important;}
  #appFrame{max-width:100%;border-left:none;border-right:none;box-shadow:0 6px 0 #000;}
  #binderStage.stage{padding:1rem .7rem 1.3rem !important;}
  .page{padding:1rem !important;}
  .grid{grid-template-columns:repeat(2,1fr) !important;gap:.7rem !important;}
}
@media (max-width:460px){
  .grid{grid-template-columns:1fr !important;}
  #eraTabs{flex-direction:column;}
  #eraTabs .era-tab{width:100%;}
}
@media (prefers-reduced-motion:reduce){
  #appFrame, .page, .card{transition:none !important;animation:none !important;}
}


/* ===== SPOTLIGHT VERTICAL STACK — full image, name/team + hint below, remove underneath ===== */
.spot-card{
  aspect-ratio:auto !important;
  display:flex;flex-direction:column;align-items:stretch;
  width:min(360px,86vw);max-height:92vh;
}
.spot-inner{
  position:relative;width:100%;aspect-ratio:2.5/3.5;flex:none;
}
.spot-face{position:absolute;inset:0;}
.spot-face .frame{position:absolute;inset:0;display:flex;}
.spot-face .photo{
  flex:1;background-size:contain !important;background-repeat:no-repeat !important;
  background-position:center center !important;background-color:#0d2d5c;
}
.spot-back .spot-back-img{
  aspect-ratio:auto !important;width:100%;max-height:60vh;
  background:#0d2d5c !important;display:flex;align-items:center;justify-content:center;
}
.spot-back .spot-back-img img{
  width:100%;height:auto;max-height:60vh;object-fit:contain !important;
  object-position:center center !important;
}
.spot-meta{
  position:static !important;bottom:auto !important;left:auto !important;right:auto !important;
  margin-top:.9rem;width:100%;display:flex;flex-direction:column;align-items:stretch;gap:.55rem;
}
.spot-meta .spot-name{
  font-family:'Press Start 2P',monospace;font-size:.6rem;line-height:1.6;color:var(--brass);
  text-shadow:2px 2px 0 #000;text-align:center;text-transform:uppercase;
}
.spot-meta .spot-name .spot-name-sub{
  display:block;color:#fff;font-size:.45rem;margin-top:.4rem;text-shadow:2px 2px 0 #000;
}
.spot-meta .hint{display:block;text-align:center;}
.spot-meta .spot-remove{margin-top:0 !important;width:100%;}
.spot-meta .spot-remove .btn-ghost{width:100% !important;display:block;}
@media (max-width:640px){
  .spot-card{width:90vw;}
  .spot-back .spot-back-img,.spot-back .spot-back-img img{max-height:48vh;}
}
@media (prefers-reduced-motion:reduce){
  .spot-inner{transition:none !important;}
}


/* ===== STAT GRID — old table look, two rows, no horizontal scroll ===== */
.statgrid-wrap{overflow-x:visible !important;overflow:visible !important;margin:0 0 .6rem !important;}
.statgrid{display:table !important;border-collapse:collapse !important;width:100%;table-layout:fixed;background:transparent;border:0 !important;}
.statgrid caption{font-family:'Oswald',sans-serif !important;font-style:normal;font-size:.78rem;color:var(--ink-soft);font-weight:600;text-align:left;caption-side:top;margin-bottom:.35rem;}
.statgrid th{font-family:'JetBrains Mono','Courier New',monospace !important;font-size:.58rem;letter-spacing:0;background:var(--sb-blue) !important;color:#fff !important;border:1px solid #000 !important;padding:.3rem .2rem;text-align:center;font-weight:500;}
.statgrid td{font-family:'JetBrains Mono','Courier New',monospace !important;font-size:.74rem;color:var(--ink);border:1px solid #000 !important;background:#fff;padding:.32rem .2rem;text-align:center;word-break:break-word;}
.statgrid tbody+thead th{border-top:2px solid #000 !important;}
@media (max-width:640px){
  .statgrid th{font-size:.5rem;}
  .statgrid td{font-size:.62rem;}
}

<!-- ===== DEPOT AUTH (Phase 1): Supabase client + auth UI styles ===== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- ===== DEPOT AUTH (Phase 1): login/signup modal ===== -->
<div class="auth-overlay" id="authOverlay" onclick="if(event.target===this)DepotAuth.closeModal()">
  <div class="auth-modal" role="dialog" aria-modal="true">
    <button class="auth-close" type="button" onclick="DepotAuth.closeModal()" aria-label="Close">&times;</button>
    <h2 id="authTitle">Log in</h2>
    <p class="sub" id="authSub">Sign in to sync your collection (coming soon).</p>
    <label for="authEmailInput">Email</label>
    <input type="email" id="authEmailInput" autocomplete="email" placeholder="you@example.com">
    <label for="authPassInput">Password</label>
    <input type="password" id="authPassInput" autocomplete="current-password" placeholder="password">
    <div class="row">
      <button class="auth-btn primary" id="authSubmitBtn" type="button" onclick="DepotAuth.submit()">Log in</button>
    </div>
    <div class="auth-msg" id="authMsg"></div>
    <div class="auth-toggle" id="authToggle">
      <span id="authToggleText">No account?</span> <a onclick="DepotAuth.toggleMode()" id="authToggleLink">Sign up</a>
    </div>
  </div>
</div>


<!-- ===== DEPOT AUTH (Phase 1): session logic. Card storage UNCHANGED (still localStorage). ===== -->
<script>
(function(){
  var SUPABASE_URL = 'https://nuymzokvbdntbvinsnda.supabase.co';
  // publishable (anon) key, client-safe / RLS-protected; assembled from parts
  var SUPABASE_KEY = ['sb','publishable','IiTsIBqYgGTIEnwdvQEXPA','4rmQdYVo'].join('_');

  if(!window.supabase || !window.supabase.createClient){
    console.warn('[DepotAuth] supabase-js failed to load; auth disabled, card flow unaffected.');
    return;
  }
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  window.supabaseClient = sb;

  var mode = 'login'; // or 'signup'
  function $(id){ return document.getElementById(id); }
  function setMsg(t, cls){ var m=$('authMsg'); if(!m) return; m.textContent=t||''; m.className='auth-msg'+(cls?(' '+cls):''); }

  function reflectMode(){
    var login = mode==='login';
    $('authTitle').textContent = login ? 'Log in' : 'Sign up';
    $('authSub').textContent = login ? 'Sign in to sync your collection (coming soon).' : 'Create an account to sync your collection (coming soon).';
    $('authSubmitBtn').textContent = login ? 'Log in' : 'Sign up';
    $('authToggleText').textContent = login ? 'No account?' : 'Have an account?';
    $('authToggleLink').textContent = login ? 'Sign up' : 'Log in';
    $('authPassInput').setAttribute('autocomplete', login ? 'current-password' : 'new-password');
  }

  var DepotAuth = {
    openModal: function(){ setMsg(''); mode='login'; reflectMode(); $('authOverlay').classList.add('open'); var e=$('authEmailInput'); if(e) e.focus(); },
    closeModal: function(){ $('authOverlay').classList.remove('open'); },
    toggleMode: function(){ mode = (mode==='login') ? 'signup' : 'login'; setMsg(''); reflectMode(); },
    submit: async function(){
      var email = ($('authEmailInput').value||'').trim();
      var pass = $('authPassInput').value||'';
      if(!email || !pass){ setMsg('Enter email and password.', 'err'); return; }
      setMsg('Working...'); $('authSubmitBtn').disabled = true;
      try{
        var res;
        if(mode==='signup'){ res = await sb.auth.signUp({ email: email, password: pass }); }
        else { res = await sb.auth.signInWithPassword({ email: email, password: pass }); }
        if(res.error){ setMsg(res.error.message, 'err'); }
        else if(mode==='signup' && res.data && res.data.session===null){
          setMsg('Account created. Check your email to confirm, then log in.', 'ok');
        } else {
          setMsg('Success.', 'ok'); setTimeout(DepotAuth.closeModal, 500);
        }
      }catch(err){ setMsg(String(err && err.message || err), 'err'); }
      finally{ $('authSubmitBtn').disabled = false; }
    },
    logout: async function(){ try{ await sb.auth.signOut(); }catch(e){ console.warn('[DepotAuth] signOut', e); } }
  };
  window.DepotAuth = DepotAuth;

  function renderSession(session){
    var loggedIn = !!(session && session.user);
    var emailEl=$('authEmail'), loginBtn=$('authLoginBtn'), logoutBtn=$('authLogoutBtn');
    if(!emailEl) return;
    if(loggedIn){
      emailEl.textContent = session.user.email || 'signed in';
      emailEl.style.display=''; loginBtn.style.display='none'; logoutBtn.style.display='';
    } else {
      emailEl.style.display='none'; loginBtn.style.display=''; logoutBtn.style.display='none';
    }
  }

  // NOTE: Phase 1 does NOT gate the card UI. Cards still load/save via localStorage, untouched.
  sb.auth.onAuthStateChange(function(event, session){
    console.log('[DepotAuth] onAuthStateChange:', event);
    renderSession(session);
  });
  sb.auth.getSession().then(function(r){ renderSession(r.data ? r.data.session : null); });

  // Enter key submits from modal inputs
  document.addEventListener('keydown', function(e){
    if(e.key==='Enter' && $('authOverlay') && $('authOverlay').classList.contains('open')){
      var a=document.activeElement;
      if(a && (a.id==='authEmailInput' || a.id==='authPassInput')){ e.preventDefault(); DepotAuth.submit(); }
    }
    if(e.key==='Escape' && $('authOverlay') && $('authOverlay').classList.contains('open')){ DepotAuth.closeModal(); }
  });
})();
</script>

<script>
/* ============================================================
   YOUR COLLECTION LIVES HERE.
   Add a card by copying one block and editing the fields.
   - era: "vintage" (≤ 1985) | "junk" (1986-1993) | "modern" (1994+)
   - type: "hitter" | "pitcher"  (drives the stat columns on the back)
   - rare: true puts a gold pin on it + glow in spotlight
   - photoFront / photoBack: any image URL (or data URL), or leave "" for a colored placeholder
        (legacy single "photo" still works and is treated as the front)
   - stats: the season line for the card's year. Use standard keys:
       hitters  → G AB R H 2B 3B HR RBI SB BB SO AVG OBP SLG OPS
       pitchers → W L ERA G GS SV IP H BB SO WHIP
   ============================================================ */
const SEED = [];

const ERAS = {
  vintage:{title:"The Vintage Years", range:"≤ 1985", skin:"skin-vintage",
    blurb:"Thick stock, hand-tinted color, and cardboard that smells like a drugstore in 1978."},
  junk:{title:"The Junk Wax Era", range:"1986–1993", skin:"skin-junk",
    blurb:"Overproduced, gloriously so. Glossy fronts, bold borders, and the rookie cards that defined a generation of collectors."},
  modern:{title:"The Modern Game", range:"1994 onward", skin:"skin-modern",
    blurb:"Premium foil, sharp photography, and the chase for the short print."}
};
const ERA_ORDER = ["vintage","junk","modern"];
// Derive era from a card's year: ≤ 1985 Vintage, 1986-1993 Junk Wax, 1994+ Modern.
function eraFromYear(y){
  const n = parseInt(y,10);
  if(!n) return null;
  if(n <= 1985) return "vintage";
  if(n <= 1993) return "junk";
  return "modern";
}
// Re-derive each card's stored era from its year so saved/seed cards re-file under current era boundaries.
function normalizeEras(arr){ if(Array.isArray(arr)){ arr.forEach(function(c){ if(c){ var e=eraFromYear(c.yr); if(e) c.era=e; } }); } return arr; }
// Auto-set the Era <select> from a year value (used by the Year field and the rolodex season pick).
function applyEraFromYear(y){
  const era = eraFromYear(y);
  if(!era) return;
  const sel = document.getElementById('f-era');
  if(sel) sel.value = era;
}
function onYearInput(){
  applyEraFromYear(document.getElementById('f-yr').value);
}
const PLACEHOLDER = ["#7d5a3c","#3a5a78","#5a3a4a","#3a5a4a","#6a4a2a","#4a4a6a"];

const STORE_KEY = "depot_cards_v1";
function newCardId(){
  return 'c_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);
}
function loadSaved(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    const arr = raw?JSON.parse(raw):[];
    let changed=false;
    if(Array.isArray(arr)){
      arr.forEach(c=>{
        if(c && !c.id){ c.id = newCardId(); changed=true; }
        // migrate legacy single photo -> photoFront (don't lose existing images)
        if(c && typeof c.photoFront==='undefined' && c.photo){ c.photoFront = c.photo; changed=true; }
        if(c && typeof c.photoBack==='undefined'){ c.photoBack = ''; }
      });
      if(changed){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(arr)); }catch(e){} }
    }
    return Array.isArray(arr)?arr:[];
  }
  catch(e){ return []; }
}
function persist(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(USER_CARDS)); return true; }
  catch(e){
    const quota = (e && (e.name==='QuotaExceededError' || e.code===22 || e.code===1014 || /quota/i.test(e.message||'')));
    toast(quota
      ? "Couldn't save — browser storage is full. Existing cards are safe; consider removing some images."
      : "Couldn't save — browser storage is unavailable. Existing cards are safe.");
    return false;
  }
}
let USER_CARDS = loadSaved();

/* ===== DEPOT DATA (Phase 2): Supabase-backed card storage for logged-in users.
   Logged-out users keep the existing localStorage flow untouched. ===== */
let DEPOT_USER = null;            // current Supabase user (or null when logged out)
let DEPOT_COLLECTION_ID = null;   // the user's default collection id
const DEPOT_IMPORT_FLAG = 'depot_imported_v1';

function depotSB(){ return window.supabaseClient || null; }
async function depotUploadImage(dataUrl, cardId, side){
  try{
    const sb=depotSB(); if(!sb||!DEPOT_USER||!DEPOT_COLLECTION_ID) return null;
    if(!dataUrl || dataUrl.indexOf('data:')!==0) return null;
    const res=await fetch(dataUrl); const blob=await res.blob();
    const path=DEPOT_USER.id+'/'+DEPOT_COLLECTION_ID+'/'+cardId+'_'+side+'.jpg';
    const up=await sb.storage.from('card-images').upload(path, blob, {contentType:'image/jpeg', upsert:true});
    if(up.error){ console.warn('[DepotData] image upload error', up.error); return null; }
    return path;
  }catch(e){ console.warn('[DepotData] image upload exception', e); return null; }
}
async function depotSignedUrl(path){
  if(!path) return '';
  if(path.indexOf('data:')===0) return path;
  try{
    const sb=depotSB(); if(!sb) return '';
    const r=await sb.storage.from('card-images').createSignedUrl(path, 3600);
    if(r.error){ console.warn('[DepotData] signed url error', r.error); return ''; }
    return (r.data && r.data.signedUrl) || '';
  }catch(e){ console.warn('[DepotData] signed url exception', e); return ''; }
}
async function depotResolveCardPhotos(c){
  if(c){
    if(c.photoFront){ c._frontPath=c.photoFront; c.photoFront=await depotSignedUrl(c.photoFront); }
    if(c.photoBack){ c._backPath=c.photoBack; c.photoBack=await depotSignedUrl(c.photoBack); }
  }
  return c;
}
function depotLoggedIn(){ return !!(DEPOT_USER && depotSB()); }

/* App cards carry fields the DB has no column for (pos,type,rare,stats).
   We tuck those into notes as a hidden JSON sidecar so nothing regresses.
   era is re-derived from year; numSort is re-derived from number. */
const META_MARK = '\n\n<!--DEPOT_META:';
const META_END  = '-->';
function packNotes(c){
  const meta = { pos:c.pos, type:c.type, rare:!!c.rare, stats:c.stats||{} };
  const bio = c.bio || '';
  return bio + META_MARK + JSON.stringify(meta) + META_END;
}
function unpackNotes(notes){
  notes = notes || '';
  const i = notes.indexOf(META_MARK);
  if(i < 0) return { bio: notes, meta: {} };
  const bio = notes.slice(0, i);
  let meta = {};
  const j = notes.indexOf(META_END, i);
  if(j > i){ try{ meta = JSON.parse(notes.slice(i + META_MARK.length, j)); }catch(e){ meta = {}; } }
  return { bio: bio, meta: meta };
}
function cardToRow(c){
  return {
    owner_id: DEPOT_USER.id,
    collection_id: DEPOT_COLLECTION_ID,
    year: parseInt(c.yr,10) || null,
    brand: c.set || null,
    set: c.set || null,
    number: (c.num!=null && c.num!=='' ? String(c.num) : null),
    player: c.name || null,
    team: c.team || null,
    notes: packNotes(c),
    tcdb_url: c.tcdb_url || null,
    photo_front_path: c.photoFront || null,
    photo_back_path: c.photoBack || null
  };
}
function rowToCard(r){
  const u = unpackNotes(r.notes);
  const yr = r.year || 0;
  return {
    id: r.id,
    name: r.player || '',
    pos: u.meta.pos || '\u2014',
    team: r.team || '\u2014',
    yr: yr,
    set: r.brand || r.set || 'Unknown',
    num: (r.number!=null ? String(r.number) : ''),
    numSort: parseInt(r.number,10) || 0,
    era: eraFromYear(yr) || 'modern',
    type: u.meta.type || 'hitter',
    rare: !!u.meta.rare,
    photoFront: r.photo_front_path || '',
    photoBack: r.photo_back_path || '',
    tcdb_url: r.tcdb_url || '',
    stats: u.meta.stats || {},
    bio: u.bio || ''
  };
}
async function depotEnsureCollection(){
  const sb = depotSB(); if(!sb || !DEPOT_USER) return null;
  let { data, error } = await sb.from('collections').select('id').eq('owner_id', DEPOT_USER.id).order('created_at',{ascending:true}).limit(1);
  if(error){ console.warn('[DepotData] collection select error', error); return null; }
  if(data && data.length){ DEPOT_COLLECTION_ID = data[0].id; return DEPOT_COLLECTION_ID; }
  let ins = await sb.from('collections').insert({ owner_id: DEPOT_USER.id, name: 'My Collection' }).select('id').single();
  if(ins.error){ console.warn('[DepotData] collection insert error', ins.error); return null; }
  DEPOT_COLLECTION_ID = ins.data.id;
  return DEPOT_COLLECTION_ID;
}
async function depotLoadCards(){
  const sb = depotSB(); if(!sb || !DEPOT_USER) return;
  if(!DEPOT_COLLECTION_ID){ await depotEnsureCollection(); }
  if(!DEPOT_COLLECTION_ID) return;
  let { data, error } = await sb.from('cards').select('*').eq('collection_id', DEPOT_COLLECTION_ID).order('created_at',{ascending:true});
  if(error){ console.warn('[DepotData] load error', error); toast('Could not load your cards from the server.'); return; }
  const cards = (data||[]).map(rowToCard);
  for(const c of cards){ await depotResolveCardPhotos(c); }
  USER_CARDS.length = 0;
  cards.forEach(c=>USER_CARDS.push(c));
  rebuild();
  if(mode==='binder'){ renderBinder(); } else { renderSetPicker(); }
  updateImportButton();
}
async function depotInsertCard(c){
  const sb = depotSB(); const row = cardToRow(c);
  const frontSrc = (typeof c.photoFront==='string' && c.photoFront.indexOf('data:')===0) ? c.photoFront : null;
  const backSrc  = (typeof c.photoBack==='string'  && c.photoBack.indexOf('data:')===0)  ? c.photoBack  : null;
  row.photo_front_path = null; row.photo_back_path = null;
  let ins = await sb.from('cards').insert(row).select('id').single();
  if(ins.error){ console.warn('[DepotData] insert error', ins.error); toast('Could not save the card to the server.'); return null; }
  c.id = ins.data.id;
  let fPath=null, bPath=null;
  if(frontSrc){ fPath = await depotUploadImage(frontSrc, c.id, 'front'); }
  if(backSrc){  bPath = await depotUploadImage(backSrc,  c.id, 'back');  }
  if(fPath || bPath){
    const upd = await sb.from('cards').update({ photo_front_path: fPath, photo_back_path: bPath }).eq('id', c.id);
    if(upd.error){ console.warn('[DepotData] path update error', upd.error); }
  }
  if((frontSrc && !fPath) || (backSrc && !bPath)){ toast('Card saved, but an image upload failed; re-edit to retry.'); }
  c.photoFront = fPath ? await depotSignedUrl(fPath) : '';
  c.photoBack  = bPath ? await depotSignedUrl(bPath) : '';
  c._frontPath = fPath; c._backPath = bPath;
  return ins.data.id;
}
async function depotDeleteCard(c){
  const sb = depotSB();
  let del = await sb.from('cards').delete().eq('id', c.id);
  if(del.error){ console.warn('[DepotData] delete error', del.error); toast('Could not delete the card on the server.'); return false; }
  return true;
}
async function depotUpdateCardPhoto(c){
  const sb = depotSB();
  const frontSrc = (typeof c.photoFront==='string' && c.photoFront.indexOf('data:')===0) ? c.photoFront : null;
  const backSrc  = (typeof c.photoBack==='string'  && c.photoBack.indexOf('data:')===0)  ? c.photoBack  : null;
  let fPath = c._frontPath || null, bPath = c._backPath || null;
  if(frontSrc){ fPath = await depotUploadImage(frontSrc, c.id, 'front'); }
  if(backSrc){  bPath = await depotUploadImage(backSrc,  c.id, 'back');  }
  let up = await sb.from('cards').update({ photo_front_path: fPath, photo_back_path: bPath }).eq('id', c.id);
  if(up.error){ console.warn('[DepotData] photo update error', up.error); toast('Could not save the image to the server.'); return false; }
  if((frontSrc && !fPath) || (backSrc && !bPath)){ toast('An image upload failed; please retry.'); }
  c.photoFront = fPath ? await depotSignedUrl(fPath) : ''; c._frontPath = fPath;
  c.photoBack  = bPath ? await depotSignedUrl(bPath) : ''; c._backPath = bPath;
  return true;
}
function depotOnAuth(session){
  const sb = depotSB(); if(!sb) return;
  const loggedIn = !!(session && session.user);
  if(loggedIn){
    DEPOT_USER = session.user;
    depotEnsureCollection().then(function(){ depotLoadCards(); });
  } else {
    DEPOT_USER = null; DEPOT_COLLECTION_ID = null;
    const local = loadSaved();
    USER_CARDS.length = 0; local.forEach(function(c){ USER_CARDS.push(c); });
    rebuild();
    if(mode==='binder'){ renderBinder(); } else { renderSetPicker(); }
  }
  updateImportButton();
}
/* ---- one-time local -> account import ---- */
function localCardCount(){
  try{ const raw=localStorage.getItem(STORE_KEY); const arr=raw?JSON.parse(raw):[]; return Array.isArray(arr)?arr.length:0; }catch(e){ return 0; }
}
function importSig(player, year, brand, number){
  return [String(player||'').trim().toLowerCase(), String(year||'').trim(), String(brand||'').trim().toLowerCase(), String(number||'').trim().toLowerCase()].join('|');
}
function normalizeLocalForRow(lc){
  return {
    yr: lc.yr, set: lc.set, num: lc.num, name: lc.name, team: lc.team,
    pos: lc.pos, type: lc.type, rare: lc.rare, stats: lc.stats||{},
    bio: lc.bio||'', photoFront: lc.photoFront||lc.photo||'', photoBack: lc.photoBack||'', tcdb_url: lc.tcdb_url||''
  };
}
function ensureImportButton(){
  let btn = document.getElementById('depotImportBtn');
  if(!btn){
    const modes = document.querySelector('.modes');
    if(!modes) return null;
    btn = document.createElement('button');
    btn.className = 'mode-btn';
    btn.id = 'depotImportBtn';
    btn.type = 'button';
    btn.textContent = 'Import my local cards to my account';
    btn.title = 'Copy the cards saved in this browser into your account';
    btn.style.display = 'none';
    btn.onclick = depotImportLocal;
    modes.appendChild(btn);
  }
  return btn;
}
function updateImportButton(){
  const btn = ensureImportButton(); if(!btn) return;
  const show = depotLoggedIn() && localCardCount() > 0;
  btn.style.display = show ? '' : 'none';
}
async function depotImportLocal(){
  if(!depotLoggedIn()){ toast('Log in first to import.'); return; }
  if(!DEPOT_COLLECTION_ID){ await depotEnsureCollection(); }
  if(!DEPOT_COLLECTION_ID){ toast('No collection to import into.'); return; }
  const sb = depotSB();
  let localCards = [];
  try{ const raw=localStorage.getItem(STORE_KEY); const arr=raw?JSON.parse(raw):[]; if(Array.isArray(arr)) localCards=arr; }catch(e){}
  if(!localCards.length){ toast('No local cards to import.'); return; }
  const btn = document.getElementById('depotImportBtn'); if(btn) btn.disabled = true;
  toast('Importing '+localCards.length+' card'+(localCards.length>1?'s':'')+'\u2026');
  let existing = new Set();
  try{
    let { data } = await sb.from('cards').select('player,year,brand,number').eq('collection_id', DEPOT_COLLECTION_ID);
    (data||[]).forEach(function(r){ existing.add(importSig(r.player, r.year, r.brand, r.number)); });
  }catch(e){}
  let imported = 0, skipped = 0;
  for(const lc of localCards){
    const sig = importSig(lc.name, parseInt(lc.yr,10)||null, lc.set, (lc.num!=null?String(lc.num):null));
    if(existing.has(sig)){ skipped++; continue; }
    const row = cardToRow(normalizeLocalForRow(lc));
    let ins = await sb.from('cards').insert(row);
    if(ins.error){ console.warn('[DepotData] import insert error', ins.error); continue; }
    existing.add(sig); imported++;
  }
  try{ localStorage.setItem(DEPOT_IMPORT_FLAG+':'+DEPOT_COLLECTION_ID, JSON.stringify({ at: Date.now(), imported: imported })); }catch(e){}
  if(btn) btn.disabled = false;
  await depotLoadCards();
  toast('Imported '+imported+' card'+(imported===1?'':'s')+(skipped?(', skipped '+skipped+' already present'):'')+'. Local backup kept.');
}
if(depotSB()){
  depotSB().auth.onAuthStateChange(function(ev, session){ depotOnAuth(session); });
  depotSB().auth.getSession().then(function(r){ depotOnAuth(r && r.data ? r.data.session : null); });
}
/* ===== END DEPOT DATA (Phase 2) ===== */

let COLLECTION = normalizeEras(SEED.concat(USER_CARDS));
function rebuild(){ COLLECTION = normalizeEras(SEED.concat(USER_CARDS)); document.getElementById('countChip').textContent=`${COLLECTION.length} cards`; }

let mode="binder", curEra="vintage", curPage=0, curSet=null, spotIdx=null, groupMode="era";
const PER_PAGE=9;

function placeholderBg(i){return PLACEHOLDER[i%PLACEHOLDER.length]}

function cssUrl(u){ return String(u).replace(/["'()\\]/g, m=>'%'+m.charCodeAt(0).toString(16)); }
// Front/back image accessors (legacy cards used a single .photo => treat as front).
function frontPhoto(c){ return (c && (c.photoFront || c.photo)) || ""; }
function backPhoto(c){ return (c && c.photoBack) || ""; }
function cardHTML(card, idx, skin){
  const cphoto = frontPhoto(card);
  const photoStyle = cphoto
    ? `background-image:url("${cssUrl(cphoto)}")`
    : `background-color:${placeholderBg(idx)}`;
  return `<button class="card ${skin}" onclick="openSpot(${idx})" aria-label="${card.name}, ${card.yr} ${card.set}">
    ${card.rare?'<span class="rare-pin" title="Key card">★</span>':''}
    <div class="frame">
      ${cphoto ? `<img class="photo loaded-img" src="${escAttr(cphoto)}" alt="" loading="lazy" style="width:100%;height:100%;object-fit:cover;object-position:center top;display:block" onload="imgOk(this)" onerror="imgFail(this)">` : `<div class="photo" style="${photoStyle}"></div>`}
      <div class="nameplate">${card.name}<span class="pos">${card.pos} · ${card.team}</span></div>
    </div>
  </button>`;
}

/* ---------- binder ---------- */
function renderEraTabs(){
  document.getElementById('eraTabs').innerHTML = ERA_ORDER.map(k=>{
    const e=ERAS[k], n=COLLECTION.filter(c=>c.era===k).length;
    return `<button class="era-tab ${k===curEra?'active':''}" onclick="selectEra('${k}')">
      ${e.title}<small>${e.range} · ${n} cards</small></button>`;
  }).join('');
}
function selectEra(k){curEra=k;curPage=0;renderBinder()}
function turnPage(d){
  const cards=COLLECTION.filter(c=>c.era===curEra);
  const pages=Math.max(1,Math.ceil(cards.length/PER_PAGE));
  curPage=Math.min(pages-1,Math.max(0,curPage+d));
  renderBinder();
}
function renderBinder(){
  if(groupMode && groupMode!=="era"){ renderGrouped(); return; }
  showEraChrome(true);
  renderEraTabs();
  const e=ERAS[curEra];
  document.getElementById('eraTitle').textContent=e.title;
  document.getElementById('eraBlurb').textContent=e.blurb;
  const cards=COLLECTION.filter(c=>c.era===curEra);
  const pages=Math.max(1,Math.ceil(cards.length/PER_PAGE));
  const start=curPage*PER_PAGE;
  const slice=cards.slice(start,start+PER_PAGE);
  let html='';
  for(let i=0;i<PER_PAGE;i++){
    if(slice[i]){
      const globalIdx=COLLECTION.indexOf(slice[i]);
      html+=`<div class="slot">${cardHTML(slice[i],globalIdx,e.skin)}</div>`;
    } else {
      html+=`<div class="slot empty">empty</div>`;
    }
  }
  document.getElementById('binderGrid').innerHTML=html;
  document.getElementById('pageDots').textContent=`Page ${curPage+1} of ${pages}`;
  document.getElementById('prevPage').disabled=curPage===0;
  document.getElementById('nextPage').disabled=curPage>=pages-1;
}


/* ---------- group-by (binder view layer) ---------- */
function setGroupMode(m){
  groupMode = m || "era";
  var sel = document.getElementById('groupBy');
  if(sel && sel.value !== groupMode) sel.value = groupMode;
  curPage = 0;
  renderBinder();
}
function showEraChrome(show){
  var rail = document.querySelector('#binderStage .rail'); if(rail) rail.style.display = show ? '' : 'none';
  var nav = document.querySelector('#binderStage .page-nav'); if(nav) nav.style.display = show ? '' : 'none';
}
function groupKeyFor(c, mode){
  if(mode === 'year'){
    return c.yr ? {key:'y'+c.yr, label:String(c.yr), sort:c.yr} : {key:'unknown', label:'Unknown', sort:Infinity};
  }
  if(mode === 'decade'){
    if(!c.yr) return {key:'unknown', label:'Unknown', sort:Infinity};
    var d = Math.floor(c.yr/10)*10; return {key:'d'+d, label:d+'s', sort:d};
  }
  if(mode === 'brand'){
    var b = (c.set||'').trim(); if(!b || b==='Unknown' || b==='—') return {key:'unknown', label:'Unknown', sort:null};
    return {key:'b:'+b.toLowerCase(), label:b, sort:b.toLowerCase()};
  }
  if(mode === 'team'){
    var t = (c.team||'').trim(); if(!t || t==='—') return {key:'unknown', label:'Unknown', sort:null};
    return {key:'t:'+t.toLowerCase(), label:t, sort:t.toLowerCase()};
  }
  if(mode === 'player'){
    var p = (c.name||'').trim(); if(!p) return {key:'unknown', label:'Unknown', sort:null};
    return {key:'p:'+p.toLowerCase(), label:p, sort:p.toLowerCase()};
  }
  var ek = c.era || 'unknown';
  return {key:ek, label:(ERAS[ek]?ERAS[ek].title:'Unknown'), sort:ERA_ORDER.indexOf(ek)};
}
function renderGrouped(){
  showEraChrome(false);
  var head = document.getElementById('eraTitle');
  var labels = {year:'Year', brand:'Brand', team:'Team', player:'Player', decade:'Decade'};
  if(head) head.textContent = 'Grouped by ' + (labels[groupMode]||'Era');
  var blurb = document.getElementById('eraBlurb');
  if(blurb) blurb.textContent = COLLECTION.length + ' cards across all eras.';
  var buckets = {};
  COLLECTION.forEach(function(c){
    var g = groupKeyFor(c, groupMode);
    if(!buckets[g.key]) buckets[g.key] = {label:g.label, sort:g.sort, cards:[]};
    buckets[g.key].cards.push(c);
  });
  var keys = Object.keys(buckets);
  var numericModes = (groupMode==='year' || groupMode==='decade' || groupMode==='era');
  keys.sort(function(a,b){
    var A=buckets[a], B=buckets[b];
    var aU = a==='unknown', bU = b==='unknown';
    if(aU && !bU) return 1; if(bU && !aU) return -1;
    if(numericModes){ return (A.sort||0)-(B.sort||0); }
    return String(A.sort).localeCompare(String(B.sort));
  });
  var html = '';
  keys.forEach(function(k){
    var b = buckets[k];
    b.cards.sort(function(x,y){ return (x.yr||0)-(y.yr||0) || ((x.numSort!=null?x.numSort:parseInt(x.num)||0)-(y.numSort!=null?y.numSort:parseInt(y.num)||0)); });
    html += '<section class="group-section"><h3 class="group-head">'+escAttr(b.label)+' <span class="group-count">'+b.cards.length+'</span></h3>';
    html += '<div class="grid group-grid">';
    b.cards.forEach(function(c){
      var gi = COLLECTION.indexOf(c);
      var skin = (ERAS[c.era] && ERAS[c.era].skin) || '';
      html += '<div class="slot">'+cardHTML(c, gi, skin)+'</div>';
    });
    html += '</div></section>';
  });
  if(!html) html = '<p class="group-empty">No cards to display.</p>';
  document.getElementById('binderGrid').innerHTML = html;
}

/* ---------- carousel ---------- */
function setKey(c){return `${c.yr} ${c.set}`}
function renderSetPicker(){
  const sets={};
  COLLECTION.forEach(c=>{const k=setKey(c);(sets[k]=sets[k]||[]).push(c)});
  const keys=Object.keys(sets).sort();

   Uses MLB's public Stats API (statsapi.mlb.com) — no key, CORS-open,
   free for personal use. Search a player, pick a season, stats auto-fill.
   Fails soft: if a lookup returns nothing, manual entry still works. */
const MLB_BASE = "https://statsapi.mlb.com/api/v1";
/* ===== Checklist card data layer (keyless/static) =====
   players.json (norm name -> {display, years[]}) loads once on first rolodex use.
   Per-year cards-YYYY.json files load only when that year is actually picked. */
let PLAYER_INDEX=null, PLAYER_INDEX_PROMISE=null;
const YEAR_CACHE={};
function normName(x){
  x=(x||"").normalize("NFKD").replace(/[\u0300-\u036f]/g,"");
  x=x.toLowerCase().replace(/\./g," ");
  x=x.replace(/\b(junior|jr)\b/g,"jr").replace(/\b(senior|sr)\b/g,"sr");
  x=x.replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim();
  return x;
}
async function getPlayerIndex(){
  if(PLAYER_INDEX) return PLAYER_INDEX;
  if(!PLAYER_INDEX_PROMISE){
    PLAYER_INDEX_PROMISE=fetch("data/players.json").then(r=>{if(!r.ok)throw new Error("http");return r.json();})
      .then(j=>{PLAYER_INDEX=j;return j;}).catch(e=>{PLAYER_INDEX_PROMISE=null;throw e;});
  }
  return PLAYER_INDEX_PROMISE;
}
async function loadYear(y){
  if(YEAR_CACHE[y]!==undefined) return YEAR_CACHE[y];
  try{ const r=await fetch("data/cards-"+y+".json"); if(!r.ok){YEAR_CACHE[y]=null;return null;} const j=await r.json(); YEAR_CACHE[y]=j; return j; }
  catch(e){ YEAR_CACHE[y]=null; return null; }
}
/* Years (from the player index) where a plain-name player has a real card. */
async function playerCardYears(displayOrName){
  let idx; try{ idx=await getPlayerIndex(); }catch(e){ return null; } /* null = index unavailable */
  const n=normName(cleanPlayerName(displayOrName));
  if(idx[n]){ const _ys=new Set(); for(const _k in idx){ if(normName(cleanPlayerName(idx[_k].display||_k))===n){ (idx[_k].years||[]).forEach(_y=>_ys.add(_y)); } } return {match:idx[n].display, years:[..._ys].sort(), exact:true}; }
  /* light fuzzy: same last token + first initial */
  const parts=n.split(" "); if(parts.length<2) return {match:null,years:[],cands:[]};
  const last=parts[parts.length-1], fi=parts[0][0];
  const cands=Object.keys(idx).filter(k=>{const p=k.split(" ");return p.length>=2 && p[p.length-1]===last && p[0][0]===fi;});
  if(cands.length===1) return {match:idx[cands[0]].display, years:idx[cands[0]].years.slice(), exact:false};
  return {match:null, years:[], cands:cands.map(c=>idx[c].display)};
}
/* Real cards for a given plain-name player in a given year (from per-year file). */
async function cardsForPlayerYear(name,y){
  const data=await loadYear(y); if(!data) return null; /* null = year file missing */
  const n=normName(name);
  const _t=normName(cleanPlayerName(name)); return data.filter(r=>{ var p=normName(cleanPlayerName(r.player)); return p===_t; });
}

function downscaleDataURL(srcDataURL, maxSide, quality){
  return new Promise((resolve)=>{
    const img=new Image();
    img.onload=function(){
      let w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
      if(!w||!h){ resolve(srcDataURL); return; }
      const longest=Math.max(w,h);
      // don't upscale: only shrink if larger than maxSide
      const scale = longest>maxSide ? maxSide/longest : 1;
      const cw=Math.round(w*scale), ch=Math.round(h*scale);
      try{
        const canvas=document.createElement('canvas');
        canvas.width=cw; canvas.height=ch;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,cw,ch);
        const out=canvas.toDataURL('image/jpeg', quality);
        // fall back to source if encoding somehow produced something larger/invalid
        resolve((out && out.length < srcDataURL.length) ? out : srcDataURL);
      }catch(err){ resolve(srcDataURL); }
    };
    img.onerror=function(){ resolve(srcDataURL); };
    img.src=srcDataURL;
  });
}

    if(!pv) return;
    ['dragenter','dragover'].forEach(ev=>pv.addEventListener(ev,e=>{
      if(e.dataTransfer && e.dataTransfer.types && [].indexOf.call(e.dataTransfer.types,'Files')>-1){
        e.preventDefault(); e.stopPropagation(); pv.classList.add('drop-hot'); imgSlot(slot);
      }
    }));
    ['dragleave','dragend'].forEach(ev=>pv.addEventListener(ev,()=>pv.classList.remove('drop-hot')));
    pv.addEventListener('drop',e=>{
      const f=imageFileFromTransfer(e.dataTransfer);
      if(!f) return;
      e.preventDefault(); e.stopPropagation(); pv.classList.remove('drop-hot'); imgSlot(slot);
      fileToDataURL(f).then(orig=>downscaleDataURL(orig,600,0.8)).then(small=>{
        slotInput(slot).value=small; setPreview(slot, small);
      }).catch(()=>toast("That didn't look like an image."));
    });
  });
})();
document.addEventListener('paste',e=>{
  const scrim=document.getElementById('formScrim');
  if(!scrim || !scrim.classList.contains('open')) return;
  if(activeSpotCardId()) return;
  const f=imageFileFromTransfer(e.clipboardData);
  if(!f) return;
  e.preventDefault();
  fileToDataURL(f).then(orig=>downscaleDataURL(orig,600,0.8)).then(small=>{
    slotInput(activeSlot).value=small; setPreview(activeSlot, small);
  }).catch(()=>{});
});

/* ---------- init ---------- */
rebuild();
renderBinder();
</script>
</body>
</html>
