<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ad-gobytrain</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>html,body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e7e5df;font-family:'Press Start 2P',monospace;image-rendering:pixelated;}*{box-sizing:border-box;}</style>
</head><body>
<div id="ad-gobytrain" style="width:290px;height:96px;position:relative;display:flex;align-items:center;justify-content:center;gap:16px;padding:0 22px;background:#14181d;border:4px solid #d97a3a;box-shadow:inset 0 0 0 2px rgba(255,255,255,.06),0 3px 0 rgba(0,0,0,.30);overflow:hidden;">
        <div style="flex:none;width:46px;height:52px;position:relative;">
          <div style="position:absolute;left:20px;top:-2px;width:2px;height:8px;background:#cfd6dd;"></div>
          <div style="position:absolute;left:22px;top:-2px;width:10px;height:6px;background:#cc2122;"></div>
          <div style="position:absolute;left:6px;top:8px;width:34px;height:34px;border-radius:50%;background:#f4f1e6;box-shadow:inset 0 0 0 3px #14181d;"></div>
          <div style="position:absolute;left:22px;top:14px;width:2px;height:12px;background:#14181d;"></div>
          <div style="position:absolute;left:22px;top:24px;width:9px;height:2px;background:#14181d;"></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:7px;align-items:flex-start;">
          <div style="font-size:14px;color:#f4f1e6;letter-spacing:1px;line-height:1.25;text-shadow:0 0 8px #9fd0ff;">GO BY<br>TRAIN</div>
          <div style="font-size:6px;color:#d97a3a;letter-spacing:2px;">UNION STATION · PORTLAND</div>
        </div>
        <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.13) 0 1px,transparent 1px 3px);"></div>
      </div>
</body></html>
