<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ad-scholls</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>html,body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e7e5df;font-family:'Press Start 2P',monospace;}*{box-sizing:border-box;}</style>
</head><body>
<div id="ad-scholls" style="width:360px;height:120px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:9px;padding-bottom:18px;background:#3a3f44;border:5px solid #cfd3d6;box-shadow:inset 0 0 0 3px rgba(255,255,255,.05),0 4px 0 rgba(0,0,0,.30);overflow:hidden;">
        <!-- gable peak -->
        <div style="position:absolute;left:50%;top:-3px;transform:translateX(-50%);width:150px;height:34px;background:#2c3034;clip-path:polygon(50% 0,100% 100%,0 100%);"></div>
        <div style="position:absolute;left:50%;top:32px;transform:translateX(-50%);width:150px;height:3px;background:#f4f6f7;"></div>
        <div style="position:relative;font-size:16px;color:#f4f6f7;letter-spacing:2px;">SCHOLLS CROSSING</div>
        <div style="position:relative;font-size:7px;color:#aab0b5;letter-spacing:2px;">RALEIGH HILLS · PORTLAND</div>
        <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.12) 0 1px,transparent 1px 3px);"></div>
      </div>
</body></html>
