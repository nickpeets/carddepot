<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ad-millennium</title>
<style>html,body{margin:0}</style>
</head>
<body>
<div id="ad-millennium" style="width:290px;height:96px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;background:#15389c;border:4px solid #ffd21a;box-shadow:inset 0 0 0 2px rgba(255,255,255,.08),0 3px 0 rgba(0,0,0,.28);overflow:hidden;"><style>@keyframes bbBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}</style>
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="flex:none;width:12px;height:16px;position:relative;animation:bbBob 1.5s ease-in-out infinite;"><div style="position:absolute;left:1px;top:10px;width:7px;height:5px;border-radius:50%;background:#ffd21a;"></div><div style="position:absolute;left:6px;top:0;width:2px;height:13px;background:#ffd21a;"></div><div style="position:absolute;left:6px;top:0;width:6px;height:6px;background:#ffd21a;clip-path:polygon(0 0,100% 35%,100% 75%,0 45%);"></div></div>
          <div style="font-size:14px;color:#ffd21a;letter-spacing:2px;">MUSIC</div>
          <div style="flex:none;width:12px;height:16px;position:relative;animation:bbBob 1.5s ease-in-out infinite;"><div style="position:absolute;left:1px;top:10px;width:7px;height:5px;border-radius:50%;background:#ffd21a;"></div><div style="position:absolute;left:6px;top:0;width:2px;height:13px;background:#ffd21a;"></div><div style="position:absolute;left:6px;top:0;width:6px;height:6px;background:#ffd21a;clip-path:polygon(0 0,100% 35%,100% 75%,0 45%);"></div></div>
        </div>
        <div style="font-size:14px;color:#ffd21a;letter-spacing:1px;">MILLENNIUM</div>
        <div style="font-size:6px;color:#bcd0ff;letter-spacing:1px;margin-top:2px;">PORTLAND · RECORDS &amp; TAPES</div>
        <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.12) 0 1px,transparent 1px 3px);"></div>
      </div>
</body>
</html>
