<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ad-dragon</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>html,body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e7e5df;font-family:'Press Start 2P',monospace;image-rendering:pixelated;}*{box-sizing:border-box;}</style>
</head><body>
<div id="ad-dragon" style="width:290px;height:96px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;background:#ffd21a;border:4px solid #1a52a8;box-shadow:inset 0 0 0 2px rgba(0,0,0,.10),0 3px 0 rgba(0,0,0,.28);overflow:hidden;">
        <div style="font-size:18px;color:#1a52a8;letter-spacing:2px;margin-bottom:6px;">DRAGON</div>
        <div style="width:100%;background:#cc2122;padding:7px 0;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 2px 0 rgba(0,0,0,.18);">
          <span style="font-size:14px;color:#f4f1e6;letter-spacing:2px;">HERBARIUM</span>
        </div>
        <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.07) 0 1px,transparent 1px 3px);"></div>
      </div>
</body></html>
