<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ad-skyline</title>
<style>html,body{margin:0}</style>
</head>
<body>
<div id="ad-skyline" style="width:290px;height:96px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;background:#cc2122;border:4px solid #f4f1e6;box-shadow:inset 0 0 0 2px rgba(0,0,0,.12),0 3px 0 rgba(0,0,0,.28);overflow:hidden;">
        <div style="font-size:17px;color:#f4f1e6;letter-spacing:1px;text-shadow:2px 2px 0 rgba(0,0,0,.3);">SKYLINE</div>
        <div style="font-size:9px;color:#f4f1e6;letter-spacing:3px;">RESTAURANT</div>
        <div style="font-size:6px;color:#ffd21a;letter-spacing:2px;">BURGERS AND SHAKES</div>
        <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.10) 0 1px,transparent 1px 3px);"></div>
      </div>
</body>
</html>
