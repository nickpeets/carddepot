<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ad-skyline</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>html,body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e7e5df;font-family:'Press Start 2P',monospace;}*{box-sizing:border-box;}</style>
</head><body>
<div id="ad-skyline" style="width:360px;height:120px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;background:#cc2122;border:5px solid #f4f1e6;box-shadow:inset 0 0 0 3px rgba(0,0,0,.12),0 4px 0 rgba(0,0,0,.28);overflow:hidden;">
        <div style="font-size:21px;color:#f4f1e6;letter-spacing:1px;text-shadow:2px 2px 0 rgba(0,0,0,.3);">SKYLINE</div>
        <div style="font-size:11px;color:#f4f1e6;letter-spacing:3px;">RESTAURANT</div>
        <div style="font-size:8px;color:#ffd21a;letter-spacing:2px;">BURGERS AND SHAKES</div>
        <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.10) 0 1px,transparent 1px 3px);"></div>
      </div>
</body></html>
