<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ad-whitestag</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>html,body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e7e5df;font-family:'Press Start 2P',monospace;}*{box-sizing:border-box;}</style>
</head><body>
<div id="ad-whitestag" style="width:290px;height:96px;position:relative;overflow:hidden;"><div style="width:360px;height:120px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:#0d0d0d;border:4px solid #f2c21a;box-shadow:inset 0 0 0 3px #0d0d0d,inset 0 0 0 4px #f2c21a,0 4px 0 rgba(0,0,0,.30);overflow:hidden;;transform:scale(0.80556,0.8);transform-origin:top left;">
        <!-- leaping stag (SVG silhouette) -->
        <svg viewBox="0 -10 112 66" width="118" height="44" style="display:block;" aria-label="leaping stag">
          <g fill="none" stroke="#f4f1e6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
            <!-- back legs -->
            <path d="M30,34 L19,54"></path>
            <path d="M37,35 L44,55"></path>
            <!-- front legs (extended, leaping) -->
            <path d="M70,34 L86,49"></path>
            <path d="M74,35 L80,55"></path>
            <!-- antlers -->
            <path d="M90,8 L83,-6 M86,-1 L78,-3 M90,8 L95,-7 M93,1 L100,-5"></path>
          </g>
          <!-- body + neck + head + tail -->
          <path d="M16,22 C16,16 24,15 30,18 C40,15 54,16 64,21 C68,14 76,9 86,6 L94,2 L101,7 L93,12 L86,15 C80,19 74,26 70,31 C56,35 38,35 28,33 C20,32 16,28 16,22 Z M16,22 L8,16 L14,25 Z" fill="#f4f1e6"></path>
        </svg>
        <div style="font-size:14px;color:#5bbf4a;letter-spacing:1px;">PORTLAND OREGON</div>
        <div style="background:#cc2122;border-radius:3px;padding:3px 12px;"><span style="font-size:9px;color:#f4f1e6;letter-spacing:3px;">OLD TOWN</span></div>
      </div></div>
</body></html>
