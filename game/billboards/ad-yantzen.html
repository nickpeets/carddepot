<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ad-yantzen</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>html,body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e7e5df;font-family:'Press Start 2P',monospace;}*{box-sizing:border-box;}</style>
</head><body>
<div id="ad-yantzen" style="width:290px;height:96px;position:relative;overflow:hidden;"><div style="width:360px;height:120px;position:relative;background:#1e2d5c;border:5px solid #f0b81e;box-shadow:inset 0 0 0 3px rgba(0,0,0,.18),0 4px 0 rgba(0,0,0,.30);overflow:hidden;;transform:scale(0.80556,0.8);transform-origin:top left;">

        <!-- DIVER (swan dive, SVG silhouette) -->
        <svg viewBox="0 0 206 86" width="206" height="86" style="position:absolute;left:4px;top:50%;transform:translateY(-50%);" aria-label="diver">
          <!-- arms -->
          <path d="M96,47 L101,55 L8,39 L3,33 Z" fill="#e7bd8f"></path>
          <path d="M104,47 L100,55 L197,31 L202,26 Z" fill="#e7bd8f"></path>
          <!-- legs (extend right) -->
          <path d="M124,57 Q160,57 200,55 Q164,71 126,68 Z" fill="#e7bd8f"></path>
          <path d="M124,64 Q160,65 200,62 L200,55 Q164,60 124,59 Z" fill="#cf9f6c"></path>
          <!-- torso -->
          <path d="M86,43 Q102,38 118,47 L132,55 Q138,60 131,66 L114,66 Q96,66 86,57 Q80,50 86,43 Z" fill="#e7bd8f"></path>
          <!-- trunks -->
          <path d="M110,53 L143,57 L145,72 L114,72 Z" fill="#d8352b"></path>
          <path d="M110,67 L145,69 L145,72 L114,72 Z" fill="#a82418"></path>
          <!-- head -->
          <circle cx="100" cy="45" r="11" fill="#e7bd8f"></circle>
          <!-- red cap -->
          <path d="M88,46 A12,12 0 0 1 112,45 L110,44 Q100,36 90,42 Z" fill="#d8352b"></path>
          <path d="M89,44 A11,11 0 0 1 110,42 L108,40 Q99,35 91,40 Z" fill="#e85a4f"></path>
        </svg>

        <!-- TEXT -->
        <div style="position:absolute;left:214px;top:0;bottom:0;display:flex;flex-direction:column;justify-content:center;gap:8px;">
          <div style="font-size:11px;line-height:1.4;color:#3a9fd8;letter-spacing:1px;">NOW<br>DIVING</div>
          <div style="font-size:17px;color:#f0b81e;letter-spacing:0;">YANTZEN</div>
          <div style="font-size:9px;color:#e9ecf2;letter-spacing:2px;">SWIM &amp; DIVE</div>
        </div>

        <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.10) 0 1px,transparent 1px 3px);"></div>
      </div></div>
</body></html>
