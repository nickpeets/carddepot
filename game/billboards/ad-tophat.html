<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ad-tophat</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>html,body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e7e5df;font-family:'Press Start 2P',monospace;}*{box-sizing:border-box;}</style>
</head><body>
<div id="ad-tophat" style="width:360px;height:120px;position:relative;display:flex;align-items:center;justify-content:center;gap:20px;padding:0 24px;background:#f4f1e6;border:5px solid #111111;box-shadow:inset 0 0 0 3px rgba(0,0,0,.06),0 4px 0 rgba(0,0,0,.28);overflow:hidden;">
        <div style="flex:none;width:56px;height:50px;position:relative;">
          <!-- wing -->
          <div style="position:absolute;left:-2px;top:24px;width:26px;height:5px;background:#111;border-radius:3px;"></div>
          <div style="position:absolute;left:0;top:30px;width:21px;height:4px;background:#111;border-radius:3px;"></div>
          <div style="position:absolute;left:3px;top:35px;width:16px;height:4px;background:#111;border-radius:3px;"></div>
          <!-- hat (tilted) -->
          <div style="position:absolute;left:20px;top:6px;width:24px;height:30px;background:#111;transform:rotate(18deg);transform-origin:bottom left;"></div>
          <div style="position:absolute;left:16px;top:30px;width:38px;height:6px;background:#111;border-radius:3px;transform:rotate(18deg);"></div>
          <div style="position:absolute;left:23px;top:24px;width:24px;height:4px;background:#f4f1e6;transform:rotate(18deg);"></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div style="font-size:22px;color:#111;letter-spacing:2px;">TOP HAT</div>
          <div style="font-size:7px;color:#111;letter-spacing:2px;">RESTAURANT &amp; BAR</div>
        </div>
        <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.05) 0 1px,transparent 1px 3px);"></div>
      </div>
</body></html>
