<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ad-oakspark</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>html,body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e7e5df;font-family:'Press Start 2P',monospace;}*{box-sizing:border-box;}</style>
</head><body>
<div id="ad-oakspark" style="width:290px;height:96px;position:relative;overflow:hidden;"><div style="width:360px;height:120px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:0;padding-top:12px;background:#f1ece0;border:5px solid #7a1f2b;box-shadow:inset 0 0 0 3px rgba(0,0,0,.06),0 4px 0 rgba(0,0,0,.28);overflow:hidden;;transform:scale(0.80556,0.8);transform-origin:top left;">
        <!-- pavilion roof -->
        <div style="position:relative;width:180px;height:22px;background:#7a1f2b;clip-path:polygon(50% 0,100% 100%,0 100%);"></div>
        <div style="position:absolute;left:50%;top:6px;transform:translateX(-50%);width:3px;height:9px;background:#7a1f2b;"></div>
        <div style="position:absolute;left:50%;top:5px;transform:translateX(-50%) translateX(3px);width:8px;height:5px;background:#e8b41e;"></div>
        <!-- carousel figures -->
        <div style="display:flex;gap:8px;margin-top:3px;">
          <div style="width:18px;height:16px;background:#8a4ec8;border-radius:8px 8px 3px 3px;"></div>
          <div style="width:18px;height:16px;background:#e8852a;border-radius:8px 8px 3px 3px;"></div>
          <div style="width:18px;height:16px;background:#3f9a35;border-radius:8px 8px 3px 3px;"></div>
          <div style="width:18px;height:16px;background:#e84a8a;border-radius:8px 8px 3px 3px;"></div>
          <div style="width:18px;height:16px;background:#2f7fd0;border-radius:8px 8px 3px 3px;"></div>
        </div>
        <!-- name band -->
        <div style="margin-top:6px;width:200px;background:#7a1f2b;border-radius:3px;padding:6px 0;display:flex;align-items:center;justify-content:center;">
          <span style="font-size:18px;color:#f0c83a;letter-spacing:2px;text-shadow:1px 1px 0 #3a0d13;">OAKS PARK</span>
        </div>
        <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.05) 0 1px,transparent 1px 3px);"></div>
      </div></div>
</body></html>
