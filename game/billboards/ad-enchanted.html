<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ad-enchanted</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>html,body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e7e5df;font-family:'Press Start 2P',monospace;}*{box-sizing:border-box;}</style>
</head><body>
<div id="ad-enchanted" style="width:290px;height:96px;position:relative;overflow:hidden;"><div style="width:360px;height:120px;position:relative;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 38%,#3fa148 0%,#22772f 70%,#16401e 100%);border:5px solid #e8b41e;box-shadow:inset 0 0 0 3px rgba(0,0,0,.12),0 4px 0 rgba(0,0,0,.30);overflow:hidden;;transform:scale(0.80556,0.8);transform-origin:top left;">
        <!-- pine silhouettes -->
        <div style="position:absolute;left:14px;bottom:8px;width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-bottom:34px solid #14401d;"></div>
        <div style="position:absolute;right:16px;bottom:8px;width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;border-bottom:40px solid #14401d;"></div>
        <!-- gold scroll banner -->
        <div style="position:relative;background:#e8b41e;border-top:3px solid #f6d873;border-bottom:3px solid #b3850f;padding:10px 26px;box-shadow:0 3px 0 rgba(0,0,0,.30);">
          <span style="font-size:16px;color:#cc2122;letter-spacing:1px;text-shadow:1px 1px 0 #f6d873;">ENCHANTED FOREST</span>
        </div>
        <div style="position:absolute;left:14px;top:50%;width:14px;height:20px;background:#e8b41e;transform:translateY(-50%);clip-path:polygon(0 0,100% 18%,100% 82%,0 100%);"></div>
        <div style="position:absolute;right:14px;top:50%;width:14px;height:20px;background:#e8b41e;transform:translateY(-50%);clip-path:polygon(100% 0,0 18%,0 82%,100% 100%);"></div>
        <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.10) 0 1px,transparent 1px 3px);"></div>
      </div></div>
</body></html>
