<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ad-enchanted</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>html,body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e7e5df;font-family:'Press Start 2P',monospace;image-rendering:pixelated;}*{box-sizing:border-box;}</style>
</head><body>
<div id="ad-enchanted" style="width:290px;height:96px;position:relative;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 38%,#3fa148 0%,#22772f 70%,#16401e 100%);border:4px solid #e8b41e;box-shadow:inset 0 0 0 2px rgba(0,0,0,.12),0 3px 0 rgba(0,0,0,.30);overflow:hidden;">
        <div style="position:absolute;left:12px;bottom:7px;width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;border-bottom:27px solid #14401d;"></div>
        <div style="position:absolute;right:13px;bottom:7px;width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:32px solid #14401d;"></div>
        <div style="position:relative;background:#e8b41e;border-top:3px solid #f6d873;border-bottom:3px solid #b3850f;padding:8px 20px;box-shadow:0 3px 0 rgba(0,0,0,.30);">
          <span style="font-size:13px;color:#cc2122;letter-spacing:1px;text-shadow:1px 1px 0 #f6d873;">ENCHANTED FOREST</span>
        </div>
        <div style="position:absolute;left:11px;top:50%;width:11px;height:16px;background:#e8b41e;transform:translateY(-50%);clip-path:polygon(0 0,100% 18%,100% 82%,0 100%);"></div>
        <div style="position:absolute;right:11px;top:50%;width:11px;height:16px;background:#e8b41e;transform:translateY(-50%);clip-path:polygon(100% 0,0 18%,0 82%,100% 100%);"></div>
        <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.10) 0 1px,transparent 1px 3px);"></div>
      </div>
</body></html>
