<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ad-alpenrose</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>html,body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e7e5df;font-family:'Press Start 2P',monospace;image-rendering:pixelated;}*{box-sizing:border-box;}</style>
</head><body>
<div id="ad-alpenrose" style="width:290px;height:96px;position:relative;display:flex;align-items:center;justify-content:center;gap:18px;padding:0 22px;background:#36465c;border:4px solid #aeb8c6;box-shadow:inset 0 0 0 2px rgba(255,255,255,.06),0 3px 0 rgba(0,0,0,.28);overflow:hidden;">
        <div style="flex:none;width:48px;height:48px;border-radius:50%;border:3px solid #d6dde6;position:relative;">
          <div style="position:absolute;left:50%;top:50%;width:13px;height:16px;margin:-10px 0 0 -6px;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;background:#d6dde6;"></div>
          <div style="position:absolute;left:50%;top:50%;width:10px;height:13px;margin:-5px 0 0 -11px;border-radius:50%;background:#aeb8c6;transform:rotate(-35deg);"></div>
          <div style="position:absolute;left:50%;top:50%;width:10px;height:13px;margin:-5px 0 0 1px;border-radius:50%;background:#aeb8c6;transform:rotate(35deg);"></div>
          <div style="position:absolute;left:50%;top:50%;width:3px;height:13px;margin:3px 0 0 -1px;background:#d6dde6;"></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div style="font-size:17px;color:#f4f6f8;letter-spacing:1px;">alpenrose</div>
          <div style="font-size:6px;color:#aeb8c6;letter-spacing:4px;">SINCE 1916</div>
        </div>
        <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.10) 0 1px,transparent 1px 3px);"></div>
      </div>
</body></html>
