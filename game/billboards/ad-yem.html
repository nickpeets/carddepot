<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ad-yem</title>
<style>html,body{margin:0}</style>
</head>
<body>
<div id="ad-yem" style="width:290px;height:96px;position:relative;display:flex;align-items:center;justify-content:center;background:#c4c4c4;border:4px solid #2f6fc8;box-shadow:inset 0 0 0 2px rgba(0,0,0,.06),0 3px 0 rgba(0,0,0,.28);overflow:hidden;">
        <div style="position:relative;font-size:35px;color:#2f6fc8;letter-spacing:4px;">YEM</div>
        <div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:170px;height:44px;pointer-events:none;background:repeating-linear-gradient(0deg,#c4c4c4 0 2px,transparent 2px 6px);"></div>
        <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.04) 0 1px,transparent 1px 3px);"></div>
      </div>
</body>
</html>
