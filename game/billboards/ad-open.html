<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ad-open</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>html,body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e7e5df;font-family:'Press Start 2P',monospace;}*{box-sizing:border-box;}</style>
</head><body>
<div id="ad-open" style="width:360px;height:120px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;background:#0e2845;border:5px dashed #5dff8a;box-shadow:inset 0 0 0 3px rgba(255,255,255,.06),0 4px 0 rgba(0,0,0,.28);overflow:hidden;">
        <div style="font-size:17px;color:#ffd23e;letter-spacing:1px;text-align:center;line-height:1.35;">YOUR AD HERE</div>
        <div style="font-size:8px;color:#7fc4ff;letter-spacing:1px;">▸ AD SPACE AVAILABLE</div>
        <div style="position:absolute;top:9px;right:11px;background:#5dff8a;color:#06121f;font-size:6px;padding:3px 5px;letter-spacing:1px;">CONTACT SALES</div>
        <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.10) 0 1px,transparent 1px 3px);"></div>
      </div>
</body></html>
