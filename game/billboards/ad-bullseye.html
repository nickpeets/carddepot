<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ad-bullseye</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>html,body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e7e5df;font-family:'Press Start 2P',monospace;}*{box-sizing:border-box;}</style>
</head><body>
<div id="ad-bullseye" style="width:360px;height:120px;position:relative;display:flex;align-items:center;gap:18px;padding:0 22px;background:#0e2233;border:5px solid #d8352b;box-shadow:inset 0 0 0 3px rgba(255,255,255,.08),0 4px 0 rgba(0,0,0,.28);overflow:hidden;">
        <div style="flex:none;width:84px;height:84px;border-radius:50%;border:3px solid #f4f1e6;background:#d8352b;box-shadow:inset 0 0 0 10px #f4f1e6,inset 0 0 0 20px #d8352b,inset 0 0 0 30px #f4f1e6;position:relative;">
          <div style="position:absolute;left:50%;top:50%;width:14px;height:14px;margin:-7px 0 0 -7px;border-radius:50%;background:#0e2233;"></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:9px;">
          <div style="font-size:15px;color:#ffd23e;letter-spacing:1px;line-height:1.3;">HIT THE<br>BULL</div>
          <div style="font-size:8px;color:#f4f1e6;letter-spacing:1px;">WIN A FREE STEAK</div>
        </div>
        <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.12) 0 1px,transparent 1px 3px);"></div>
      </div>
</body></html>
