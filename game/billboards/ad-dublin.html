<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ad-dublin</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>html,body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e7e5df;font-family:'Press Start 2P',monospace;}*{box-sizing:border-box;}</style>
</head><body>
<div id="ad-dublin" style="width:290px;height:96px;position:relative;overflow:hidden;"><div style="width:360px;height:120px;position:relative;display:flex;align-items:center;gap:18px;padding:0 22px;background:#14241a;border:5px solid #2e9e4f;box-shadow:inset 0 0 0 3px rgba(255,255,255,.06),0 4px 0 rgba(0,0,0,.28);overflow:hidden;;transform:scale(0.80556,0.8);transform-origin:top left;">
        <div style="flex:none;width:86px;height:86px;border-radius:50%;background:#2e9e4f;border:3px solid #0e1a12;box-shadow:inset 0 0 0 3px #f4f1e6;display:flex;align-items:center;justify-content:center;">
          <div style="width:58px;height:58px;border-radius:50%;background:#14241a;position:relative;">
            <div style="position:absolute;left:13px;top:13px;width:20px;height:20px;border-radius:50% 50% 50% 0;background:#f4f1e6;transform:rotate(45deg);"></div>
            <div style="position:absolute;left:25px;top:13px;width:20px;height:20px;border-radius:50% 50% 0 50%;background:#f4f1e6;transform:rotate(-45deg);"></div>
            <div style="position:absolute;left:13px;top:25px;width:20px;height:20px;border-radius:50% 0 50% 50%;background:#f4f1e6;transform:rotate(45deg);"></div>
            <div style="position:absolute;left:25px;top:25px;width:20px;height:20px;border-radius:0 50% 50% 50%;background:#f4f1e6;transform:rotate(-45deg);"></div>
            <div style="position:absolute;left:27px;top:38px;width:4px;height:16px;background:#f4f1e6;border-radius:2px;"></div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div style="font-size:17px;color:#5fd083;letter-spacing:1px;line-height:1.3;">DUBLIN<br>PUB</div>
          <div style="font-size:7px;color:#f4f1e6;letter-spacing:1px;">PORTLAND, OREGON · 1983</div>
        </div>
        <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.13) 0 1px,transparent 1px 3px);"></div>
      </div></div>
</body></html>
