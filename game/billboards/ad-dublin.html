<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ad-dublin</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>html,body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e7e5df;font-family:'Press Start 2P',monospace;image-rendering:pixelated;}*{box-sizing:border-box;}</style>
</head><body>
<div id="ad-dublin" style="width:290px;height:96px;position:relative;display:flex;align-items:center;gap:16px;padding:0 18px;background:#14241a;border:4px solid #2e9e4f;box-shadow:inset 0 0 0 2px rgba(255,255,255,.06),0 3px 0 rgba(0,0,0,.28);overflow:hidden;">
        <div style="flex:none;width:68px;height:68px;border-radius:50%;background:#2e9e4f;border:2px solid #0e1a12;box-shadow:inset 0 0 0 2px #f4f1e6;display:flex;align-items:center;justify-content:center;">
          <div style="width:46px;height:46px;border-radius:50%;background:#14241a;position:relative;">
            <div style="position:absolute;left:10px;top:10px;width:16px;height:16px;border-radius:50% 50% 50% 0;background:#f4f1e6;transform:rotate(45deg);"></div>
            <div style="position:absolute;left:20px;top:10px;width:16px;height:16px;border-radius:50% 50% 0 50%;background:#f4f1e6;transform:rotate(-45deg);"></div>
            <div style="position:absolute;left:10px;top:20px;width:16px;height:16px;border-radius:50% 0 50% 50%;background:#f4f1e6;transform:rotate(45deg);"></div>
            <div style="position:absolute;left:20px;top:20px;width:16px;height:16px;border-radius:0 50% 50% 50%;background:#f4f1e6;transform:rotate(-45deg);"></div>
            <div style="position:absolute;left:22px;top:30px;width:3px;height:13px;background:#f4f1e6;border-radius:2px;"></div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:7px;">
          <div style="font-size:15px;color:#5fd083;letter-spacing:1px;line-height:1.3;">DUBLIN<br>PUB</div>
          <div style="font-size:6px;color:#f4f1e6;letter-spacing:1px;">PORTLAND, OREGON · 1983</div>
        </div>
        <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.13) 0 1px,transparent 1px 3px);"></div>
      </div>
</body></html>
