  renderVals() {
    const blink = this.props.blink ?? true;
    const bob = this.props.bob ?? true;
    return {
      headlineAnim: blink ? "scbBlink 1.1s steps(1,end) infinite" : "none",
      bobAnim: bob ? "scbBob 2.6s ease-in-out infinite" : "none",
    };
  }
}
