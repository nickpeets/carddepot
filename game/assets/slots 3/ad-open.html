<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ad-open</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>html,body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e7e5df;font-family:'Press Start 2P',monospace;image-rendering:pixelated;}*{box-sizing:border-box;}@keyframes bbNeon{0%,38%,42%,46%,78%,82%,100%{opacity:1}40%{opacity:.45}44%{opacity:.82}80%{opacity:.32}}@keyframes bbPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}@keyframes bbBlink{0%,52%{opacity:1}53%,100%{opacity:.22}}@keyframes bbBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}@keyframes bbSteam{0%{transform:translateY(0) scale(.5);opacity:.85}100%{transform:translateY(-13px) scale(1.3);opacity:0}}</style>
</head><body>
<div id="ad-open" style="width:290px;height:96px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:#0e2845;border:4px dashed #5dff8a;box-shadow:inset 0 0 0 2px rgba(255,255,255,.06),0 3px 0 rgba(0,0,0,.28);overflow:hidden;">
        <div style="font-size:14px;color:#ffd23e;letter-spacing:1px;text-align:center;line-height:1.35;">YOUR AD HERE</div>
        <div style="font-size:7px;color:#7fc4ff;letter-spacing:1px;">▸ AD SPACE AVAILABLE</div>
        <div style="position:absolute;top:7px;right:9px;background:#5dff8a;color:#06121f;font-size:5px;padding:3px 5px;letter-spacing:1px;animation:bbBlink 1.2s steps(1,end) infinite;">CONTACT SALES</div>
        <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.10) 0 1px,transparent 1px 3px);"></div>
      </div>
</body></html>
