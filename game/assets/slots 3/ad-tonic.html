<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ad-tonic</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>html,body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e7e5df;font-family:'Press Start 2P',monospace;image-rendering:pixelated;}*{box-sizing:border-box;}@keyframes bbNeon{0%,38%,42%,46%,78%,82%,100%{opacity:1}40%{opacity:.45}44%{opacity:.82}80%{opacity:.32}}@keyframes bbPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}@keyframes bbBlink{0%,52%{opacity:1}53%,100%{opacity:.22}}@keyframes bbBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}@keyframes bbSteam{0%{transform:translateY(0) scale(.5);opacity:.85}100%{transform:translateY(-13px) scale(1.3);opacity:0}}</style>
</head><body>
<div id="ad-tonic" style="width:290px;height:96px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;background:#efe6c8;border:4px solid #1c1813;box-shadow:inset 0 0 0 2px #efe6c8,inset 0 0 0 4px #1c1813,0 3px 0 rgba(0,0,0,.28);overflow:hidden;">
        <div style="font-size:24px;color:#1c1813;letter-spacing:2px;">TONIC</div>
        <div style="display:flex;align-items:center;gap:9px;"><div style="width:22px;height:2px;background:#1c1813;"></div><span style="font-size:8px;color:#1c1813;letter-spacing:5px;">LOUNGE</span><div style="width:22px;height:2px;background:#1c1813;"></div></div>
        <div style="position:absolute;left:8px;top:8px;width:7px;height:7px;background:#1c1813;transform:rotate(45deg);"></div>
        <div style="position:absolute;right:8px;top:8px;width:7px;height:7px;background:#1c1813;transform:rotate(45deg);"></div>
        <div style="position:absolute;left:8px;bottom:8px;width:7px;height:7px;background:#1c1813;transform:rotate(45deg);"></div>
        <div style="position:absolute;right:8px;bottom:8px;width:7px;height:7px;background:#1c1813;transform:rotate(45deg);"></div>
      </div>
</body></html>
