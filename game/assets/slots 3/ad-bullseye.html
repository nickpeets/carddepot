<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ad-bullseye</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>html,body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e7e5df;font-family:'Press Start 2P',monospace;image-rendering:pixelated;}*{box-sizing:border-box;}@keyframes bbNeon{0%,38%,42%,46%,78%,82%,100%{opacity:1}40%{opacity:.45}44%{opacity:.82}80%{opacity:.32}}@keyframes bbPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}@keyframes bbBlink{0%,52%{opacity:1}53%,100%{opacity:.22}}@keyframes bbBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}@keyframes bbSteam{0%{transform:translateY(0) scale(.5);opacity:.85}100%{transform:translateY(-13px) scale(1.3);opacity:0}}</style>
</head><body>
<div id="ad-bullseye" style="width:290px;height:96px;position:relative;display:flex;align-items:center;gap:16px;padding:0 18px;background:#0e2233;border:4px solid #d8352b;box-shadow:inset 0 0 0 2px rgba(255,255,255,.08),0 3px 0 rgba(0,0,0,.28);overflow:hidden;">
        <div style="flex:none;width:68px;height:68px;border-radius:50%;border:3px solid #f4f1e6;background:#d8352b;box-shadow:inset 0 0 0 8px #f4f1e6,inset 0 0 0 16px #d8352b,inset 0 0 0 24px #f4f1e6;position:relative;animation:bbPulse 1.6s ease-in-out infinite;transform-origin:center;">
          <div style="position:absolute;left:50%;top:50%;width:12px;height:12px;margin:-6px 0 0 -6px;border-radius:50%;background:#0e2233;"></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div style="font-size:12px;color:#ffd23e;letter-spacing:1px;line-height:1.3;">HIT THE<br>BULL</div>
          <div style="font-size:6px;color:#f4f1e6;letter-spacing:1px;">WIN A FREE STEAK</div>
        </div>
        <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.12) 0 1px,transparent 1px 3px);"></div>
      </div>
</body></html>
