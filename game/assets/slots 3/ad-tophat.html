<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ad-tophat</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>html,body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e7e5df;font-family:'Press Start 2P',monospace;image-rendering:pixelated;}*{box-sizing:border-box;}@keyframes bbNeon{0%,38%,42%,46%,78%,82%,100%{opacity:1}40%{opacity:.45}44%{opacity:.82}80%{opacity:.32}}@keyframes bbPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}@keyframes bbBlink{0%,52%{opacity:1}53%,100%{opacity:.22}}@keyframes bbBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}@keyframes bbSteam{0%{transform:translateY(0) scale(.5);opacity:.85}100%{transform:translateY(-13px) scale(1.3);opacity:0}}</style>
</head><body>
<div id="ad-tophat" style="width:290px;height:96px;position:relative;display:flex;align-items:center;justify-content:center;gap:16px;padding:0 20px;background:#f4f1e6;border:4px solid #111111;box-shadow:inset 0 0 0 2px rgba(0,0,0,.06),0 3px 0 rgba(0,0,0,.28);overflow:hidden;">
        <div style="flex:none;width:46px;height:40px;position:relative;">
          <div style="position:absolute;left:-2px;top:19px;width:21px;height:4px;background:#111;border-radius:2px;"></div>
          <div style="position:absolute;left:0;top:24px;width:17px;height:3px;background:#111;border-radius:2px;"></div>
          <div style="position:absolute;left:2px;top:28px;width:13px;height:3px;background:#111;border-radius:2px;"></div>
          <div style="position:absolute;left:16px;top:5px;width:19px;height:24px;background:#111;transform:rotate(18deg);transform-origin:bottom left;"></div>
          <div style="position:absolute;left:13px;top:24px;width:30px;height:5px;background:#111;border-radius:2px;transform:rotate(18deg);"></div>
          <div style="position:absolute;left:18px;top:19px;width:19px;height:3px;background:#f4f1e6;transform:rotate(18deg);"></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:7px;">
          <div style="font-size:18px;color:#111;letter-spacing:2px;">TOP HAT</div>
          <div style="font-size:6px;color:#111;letter-spacing:2px;">RESTAURANT &amp; BAR</div>
        </div>
        <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.05) 0 1px,transparent 1px 3px);"></div>
      </div>
</body></html>
