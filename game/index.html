document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

in-width:0;display:flex;flex-direction:column;gap:11px;font-size:17px;color:#4fd45a;\">\n              <div style=\"color:#f0e7cf;line-height:1.3;overflow-wrap:anywhere;\">LEFTY LIU<\u002Fdiv>\n              <div>AVG <span style=\"color:#fff;\">.301<\u002Fspan><\u002Fdiv>\n              <div style=\"white-space:nowrap;font-size:15px;\">HR <span style=\"color:#fff;\">5<\u002Fspan>  RBI <span style=\"color:#fff;\">19<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div id=\"tile-ad\" style=\"flex:1;background:#8a1f1f;border:4px solid #f6c81e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:#f6e6c0;text-align:center;padding:8px;\">\n          <div style=\"font-size:18px;color:#f6c81e;\">★<\u002Fdiv>\n          <div style=\"font-size:20px;\">SLUGGER<\u002Fdiv>\n          <div style=\"font-size:14px;color:#f0d9a0;line-height:1.4;\">ENERGY DRINK<\u002Fdiv>\n        <\u002Fdiv>\n        <div id=\"tile-music\" style=\"width:200px;background:#5b605b;border:4px solid #6f746f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#e9e9e9;\">\n          <div style=\"width:64px;height:64px;border-radius:50%;background:#fff;overflow:hidden;flex:none;\"><img src=\"22d5418f-40b8-4bd5-9368-d86f2eac9853\" alt=\"\" style=\"width:100%;height:100%;object-fit:contain;display:block;\"><\u002Fdiv>\n          <div style=\"font-size:24px;\">LIVE<\u002Fdiv>\n          <div style=\"font-size:15px;color:#cfd2cf;\">MUSIC<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===== OUTER FRAME ===== -->\n    <div style=\"position:absolute;inset:0;border:16px solid #000;box-sizing:border-box;pointer-events:none;z-index:50;\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount(){\n    this._fit = () => this.fit();\n    window.addEventListener('resize', this._fit);\n    window.addEventListener('load', this._fit);\n    this.fit();\n    requestAnimationFrame(this._fit);\n    if(window.ResizeObserver){\n      this._ro = new ResizeObserver(this._fit);\n      this._ro.observe(document.documentElement);\n    }\n  }\n  componentWillUnmount(){\n    window.removeEventListener('resize', this._fit);\n    window.removeEventListener('load', this._fit);\n    if(this._ro) this._ro.disconnect();\n  }\n  fit(){\n    if(!this.stageEl) return;\n    const vw = window.innerWidth || document.documentElement.clientWidth || 0;\n    const vh = window.innerHeight || document.documentElement.clientHeight || 0;\n    const s = Math.min(vw/2000, vh/1333);\n    if(!(s > 0)){\n      requestAnimationFrame(this._fit || (() => this.fit()));\n      return;\n    }\n    this.stageEl.style.transform = `translate(-50%,-50%) scale(${s})`;\n  }\n  renderVals(){\n    const labels = ['1','2','3','4','5','6','7','8','9','r','h','e'];\n    const mk = (team, key, arr) => ({\n      team, key,\n      cells: arr.map((v,i) => ({ id: key + '-' + labels[i], v }))\n    });\n    return {\n      setStage: el => { this.stageEl = el; this.fit(); },\n      rows: [\n        mk('MUDCATS','mudcats',['0','2','0','1','0','0','3','0','-','6','9','1']),\n        mk('ACORNS','acorns',['1','0','0','2','0','1','0','2','-','6','8','0']),\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"

  <script>
  // ===== MULTIPLAYER ASYNC PLAY bootstrap (match mode) =====================
  (function(){
    "use strict";
    var SUPABASE_URL='https://nuymzokvbdntbvinsnda.supabase.co';
    var SUPABASE_KEY=['sb','publishable','IiTsIBqYgGTIEnwdvQEXPA','4rmQdYVo'].join('_');
    function qp(n){ try{ return new URLSearchParams(window.location.search).get(n); }catch(e){ return null; } }
    var matchId = qp('match');
    if(!matchId) return; // no match param -> solo vs ACORNS, untouched

    var sb=null;
    try{ if(window.supabase&&window.supabase.createClient){ sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY); } }catch(e){}

    function banner(msg, kind){
      var b=document.getElementById('mpGameBanner');
      if(!b){ b=document.createElement('div'); b.id='mpGameBanner';
        b.style.cssText='position:fixed;top:0;left:0;right:0;z-index:200000;padding:8px 14px;font-family:monospace;font-size:13px;font-weight:bold;text-align:center;letter-spacing:1px;box-shadow:0 2px 8px rgba(0,0,0,0.5);';
        document.body.appendChild(b);
      }
      b.style.background = kind==='err' ? '#7a1c1c' : '#13707f';
      b.style.color = '#f6c81e';
      b.textContent = msg;
    }

    function waitEngine(cb,tries){
      tries = tries||0;
      if(window.__simEngine && window.__simEngine.applyDepotTeam && window.__simEngine.resetGame){ cb(); return; }
      if(tries>120){ banner('Sim engine did not load. Try a hard refresh.', 'err'); return; }
      setTimeout(function(){ waitEngine(cb,tries+1); }, 50);
    }

    (async function init(){
      if(!sb){ banner("Multiplayer needs a connection. Showing a solo demo instead.", 'err'); return; }
      var res;
      try{ res = await sb.from('matches').select('*').eq('id', matchId).maybeSingle(); }
      catch(e){ banner("Couldn't load this match (network). Showing a solo demo.", 'err'); return; }
      if(res.error){ banner("Couldn't load this match: "+(res.error.message||'error')+". Showing a solo demo.", 'err'); return; }
      var m = res.data;
      if(!m){ banner("This match isn't available (not found). Showing a solo demo.", 'err'); return; }
      if(m.status==='pending'){ banner("This match isn't ready yet \u2014 it hasn't been accepted. Showing a solo demo.", 'err'); return; }
      if(m.status==='declined'){ banner("This match was declined. Showing a solo demo.", 'err'); return; }
      if(m.status!=='accepted' && m.status!=='played'){ banner("This match can't be played (status: "+m.status+"). Showing a solo demo.", 'err'); return; }
      if(!m.challenger_lineup || !m.opponent_lineup){ banner("This match is missing a lineup. Showing a solo demo.", 'err'); return; }

      // current user (for party check + writeback routing)
      var me=null;
      try{ var u=await sb.auth.getUser(); me=u.data&&u.data.user?u.data.user.id:null; }catch(e){}
      var isParty = me && (me===m.challenger_id || me===m.opponent_id);
      if(me && !isParty){ banner("You're not a player in this match \u2014 viewing only.", 'err'); }

      var cName=(m.challenger_lineup.teamName||'CHALLENGER');
      var oName=(m.opponent_lineup.teamName||'OPPONENT');
      var seed=(m.seed!=null)?(Number(m.seed)>>>0):12345;

      window.__DEPOT_MATCH_SEED = seed;
      var firstPlay = (m.status==='accepted');

      waitEngine(function(){
        var E=window.__simEngine;
        // challenger -> MUDCATS (visitor/top), opponent -> ACORNS (home/bot)
        var okC=E.applyDepotTeam(E.MUDCATS, m.challenger_lineup);
        var okO=E.applyDepotTeam(E.ACORNS, m.opponent_lineup);
        if(!okC || !okO){ banner("This match's lineup couldn't be loaded. Showing a solo demo.", 'err'); return; }

        // result writeback on completion (only first play of an 'accepted' match)
        var wroteBack=false;
        window.__onMatchComplete = function(line){
          if(!firstPlay || wroteBack || !isParty) {
            banner('FINAL \u2014 '+cName+' '+line.mudcats.r+', '+oName+' '+line.acorns.r+(m.status==='played'?'  (replay)':''));
            return;
          }
          wroteBack=true;
          var result={ final:{ challenger:line.mudcats.r, opponent:line.acorns.r },
            box:{ challenger:{ team:cName, r:line.mudcats.r, h:line.mudcats.h, e:line.mudcats.e, innings:line.mudcats.innings },
                  opponent:{ team:oName, r:line.acorns.r, h:line.acorns.h, e:line.acorns.e, innings:line.acorns.innings } },
            seed:seed, playedAt:new Date().toISOString() };
          banner('FINAL \u2014 '+cName+' '+line.mudcats.r+', '+oName+' '+line.acorns.r+'  (saving\u2026)');
          (async function(){
            try{
              var upd=await sb.from('matches').update({ result:result, status:'played' }).eq('id',matchId).eq('status','accepted').select();
              if(upd.error){ banner('FINAL \u2014 '+cName+' '+line.mudcats.r+', '+oName+' '+line.acorns.r+'  (save failed: '+(upd.error.message||'err')+')','err'); return; }
              if(!upd.data||!upd.data.length){ banner('FINAL \u2014 '+cName+' '+line.mudcats.r+', '+oName+' '+line.acorns.r+'  (already saved)'); return; }
              var other = (me===m.challenger_id)? m.opponent_id : m.challenger_id;
              if(other){ try{ await sb.from('notifications').insert([{ user_id:other, type:'match_played', match_id:matchId }]); }catch(e){} }
              banner('FINAL \u2014 '+cName+' '+line.mudcats.r+', '+oName+' '+line.acorns.r+'  (saved)');
            }catch(e){ banner('FINAL \u2014 '+cName+' '+line.mudcats.r+', '+oName+' '+line.acorns.r+'  (save error)','err'); }
          })();
        };

        banner((m.status==='played'?'REPLAY: ':'MATCH: ')+cName+' vs '+oName+'  \u2014 Chip Dungaree on the call');
        E.resetGame(seed); // deterministic replay from the match seed
        if(E.repaintMatchTeams){ E.repaintMatchTeams(); setTimeout(E.repaintMatchTeams,60); setTimeout(E.repaintMatchTeams,300); }
      });
    })();
  })();
  </script>

<script>
// Back to Depot button. The bundler does document.documentElement.replaceWith(...),
// so a static element would be wiped. Inject after load and keep it present.
(function(){
  function add(){
    if(document.getElementById("backToDepot")) return;
    var a=document.createElement("a");
    a.id="backToDepot"; a.href="../index.html"; a.setAttribute("role","button");
    a.textContent="\u2190 BACK TO DEPOT";
    a.style.cssText="position:fixed;top:10px;left:10px;z-index:2147483647;pointer-events:auto;"+
      "font-family:monospace;font-size:11px;letter-spacing:1px;text-decoration:none;"+
      "color:#f7f0db;background:rgba(10,16,20,0.9);border:2px solid #f6c81e;"+
      "padding:7px 10px;box-shadow:0 2px 0 rgba(0,0,0,0.5);";
    (document.body||document.documentElement).appendChild(a);
  }
  if(document.readyState==="complete") add(); else window.addEventListener("load",add);
  // re-assert shortly after, in case bundle render finishes just after load
  setTimeout(add,300); setTimeout(add,1200);
})();
</script>
